                // === GRAND DEATH EXPLOSION — the final artwork ===
                // All 15 colors get their moment — concentric rings of variety
                const deathColors = [...pixelColors];
                
                // 1. Dense core — thick paint pool, random colors
                for (let i = 0; i < 250; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 70;
                    const t = new FireTrail(player.x + Math.cos(angle) * dist, player.y + Math.sin(angle) * dist);
                    t.size = 3 + Math.random() * 5;
                    t.color = deathColors[Math.floor(Math.random() * deathColors.length)];
                    fireTrails.push(t);
                }
                
                // 2. Color-banded rings — each ring is a different dominant color
                const numRings = 5;
                for (let ring = 0; ring < numRings; ring++) {
                    const ringColor = deathColors[(ring * 3) % deathColors.length];
                    const ringDist = 50 + ring * 35;
                    const dotsPerRing = 40 + ring * 10;
                    for (let i = 0; i < dotsPerRing; i++) {
                        const angle = (i / dotsPerRing) * Math.PI * 2 + Math.random() * 0.3;
                        const jitter = (Math.random() - 0.5) * 20;
                        const t = new FireTrail(
                            player.x + Math.cos(angle) * (ringDist + jitter),
                            player.y + Math.sin(angle) * (ringDist + jitter)
                        );
                        t.size = 2 + Math.random() * 3;
                        t.color = Math.random() < 0.7 ? ringColor : deathColors[Math.floor(Math.random() * deathColors.length)];
                        fireTrails.push(t);
                    }
                }
                
                // 3. Dramatic spray fingers — more and longer, each a different color
                const numSprays = 10 + Math.floor(Math.random() * 6);
                for (let s = 0; s < numSprays; s++) {
                    const sprayAngle = (s / numSprays) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
                    const sprayLen = 100 + Math.random() * 180;
                    const sprayWidth = 5 + Math.random() * 10;
                    const sprayColor = deathColors[s % deathColors.length];
                    for (let j = 0; j < 40; j++) {
                        const along = 40 + Math.random() * sprayLen;
                        const across = (Math.random() - 0.5) * sprayWidth;
                        const px = player.x + Math.cos(sprayAngle) * along + Math.cos(sprayAngle + Math.PI/2) * across;
                        const py = player.y + Math.sin(sprayAngle) * along + Math.sin(sprayAngle + Math.PI/2) * across;
                        const t = new FireTrail(px, py);
                        t.size = 0.8 + Math.random() * 3 * (1 - along / (sprayLen + 100));
                        t.color = Math.random() < 0.6 ? sprayColor : deathColors[Math.floor(Math.random() * deathColors.length)];
                        fireTrails.push(t);
                    }
                }
                
                // 4. Scattered confetti — tiny dots everywhere like paint mist
                for (let i = 0; i < 120; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 80 + Math.random() * 150;
                    const t = new FireTrail(player.x + Math.cos(angle) * dist, player.y + Math.sin(angle) * dist);
                    t.size = 0.5 + Math.random() * 1.5;
                    t.color = deathColors[Math.floor(Math.random() * deathColors.length)];
                    fireTrails.push(t);
                }
                
                // Schedule all enemies to chain-explode — each plays descending note
                const enemyCopy = [...enemies];
                const deathScale = [1047, 988, 880, 784, 659, 587, 523, 440, 392, 330, 262, 247, 220, 196, 175];
                enemyCopy.forEach((enemy, idx) => {
                    setTimeout(() => {
                        if (gameState !== 'dying') return;
                        spawnPixelDeath(enemy.x, enemy.y, enemy.favoriteColor);
                        if (enemy.isBoss) spawnWhitePaintBomb(enemy.x, enemy.y);
                        // Descending musical note instead of generic death sound
                        const deathNote = deathScale[idx % deathScale.length];
                        synthTone(deathNote, 0.2, 0.08, 'sine');
                        synthTone(deathNote * 0.5, 0.15, 0.04, 'sine');
                        synthNoise(0.05, 0.05, 1500);
                        haptic(12);
                        // Paint fling — each pixel picks ONE bold color and commits
                        // Mix of thick slow globs + fast thin streaks
                        for (let i = 0; i < 70; i++) {
                            const a = Math.random() * Math.PI * 2;
                            const isGlob = Math.random() < 0.25; // 25% thick slow globs
                            const isStreak = !isGlob && Math.random() < 0.35; // ~26% fast thin streaks
                            // rest are medium
                            const spd = isGlob ? (0.8 + Math.random() * 1.5) :
                                         isStreak ? (3 + Math.random() * 5) :
                                         (1.5 + Math.random() * 3);
                            const sz = isGlob ? (3 + Math.random() * 4) :
                                       isStreak ? (0.8 + Math.random() * 1.2) :
                                       (1.5 + Math.random() * 2.5);
                            const decay = isGlob ? 0.96 : isStreak ? 0.995 : 0.98;
                            const life = isGlob ? (80 + Math.random() * 60) :
                                         isStreak ? (250 + Math.random() * 150) :
                                         (150 + Math.random() * 100);
                            dyingDriftPixels.push({
                                x: enemy.x + (Math.random()-0.5)*15,
                                y: enemy.y + (Math.random()-0.5)*15,
                                vx: Math.cos(a) * spd,
                                vy: Math.sin(a) * spd,
                                size: sz,
                                decay: decay,
                                color: pixelColors[Math.floor(Math.random() * pixelColors.length)],
                                life: life,
                                shifting: false
                            });
                        }
                    }, 80 + idx * 100); // stagger explosions ~100ms apart
                });
                
                // After all explosions + drift, transition to gameOver
                const totalDeathTime = Math.max(3500, 80 + enemyCopy.length * 100 + 1500);
                setTimeout(() => {
                    if (gameState !== 'dying') return;
                    gameState = 'gameOver';
                    gameOverTime = Date.now();
                    playSound('game-over');
                }, totalDeathTime);
            }
            
            // Clear enemies during death sequence (they explode via setTimeout)
            if (gameState === 'dying') {
                enemies = [];
            }

            // Capture art when entering gameOver (after death sequence)
        function captureArt() {
                const artScale = 2;
                const artCanvas = document.createElement('canvas');
                artCanvas.width = canvas.width * artScale;
                artCanvas.height = canvas.height * artScale;
                const artCtx = artCanvas.getContext('2d');
                artCtx.fillStyle = '#ffffff';
                artCtx.fillRect(0, 0, artCanvas.width, artCanvas.height);
                if (paintCanvas) {
                    artCtx.imageSmoothingEnabled = false;
                    artCtx.drawImage(paintCanvas, 0, 0, artCanvas.width, artCanvas.height);
                    artCtx.imageSmoothingEnabled = true;
                }
                fireTrails.forEach(trail => {
                    artCtx.fillStyle = trail.color;
                    const sx = trail.x * artScale;
                    const sy = trail.y * artScale;
                    const ss = trail.size * artScale;
                    artCtx.fillRect(sx - ss, sy - ss, ss * 2, ss * 2);
                });
                artCtx.save();
                artCtx.font = `${Math.round(artCanvas.width * 0.018)}px monospace`;
                artCtx.fillStyle = 'rgba(180,180,180,0.5)';
                artCtx.textAlign = 'right';
                artCtx.fillText('made with Death Paint', artCanvas.width - 12, artCanvas.height - 10);
                artCtx.restore();
                capturedArt = artCanvas;
                
                const sampleData = artCtx.getImageData(0, 0, artCanvas.width, artCanvas.height).data;
                let coloredPixels = 0;
                const totalSampled = artCanvas.width * artCanvas.height;
                for (let i = 0; i < sampleData.length; i += 16) {
                    const r = sampleData[i], g = sampleData[i+1], b = sampleData[i+2];
                    if (r !== 255 || g !== 255 || b !== 255) coloredPixels++;
                }
                canvasCoverage = Math.round((coloredPixels / (totalSampled / 4)) * 100);

                // Generate art title
                if (!currentArtTitle) {
                    currentArtTitle = artTitles[Math.floor(Math.random() * artTitles.length)] + Math.floor(Math.random() * 999);
                }
        }
            
            // Update screen shake
            if (screenShake > 0) {
                screenShake--;
            }
            
            // Update paint rain
            if (paintRainActive) {
                // Spawn drops only during the initial burst
                if (paintRainTimer > 0) {
                    paintRainTimer--;
                    for (let i = 0; i < 6; i++) {
                        paintRainDrops.push({
                            x: Math.random() * canvas.width,
                            y: -10 - Math.random() * 50,
                            vy: 2 + Math.random() * 3,
                            vx: (Math.random() - 0.5) * 1,
                            size: 2 + Math.random() * 3,
                            color: pixelColors[Math.floor(Math.random() * pixelColors.length)]
                        });
                    }
                }
                // Update drops — they fall and stick where they land
                paintRainDrops = paintRainDrops.filter(d => {
                    d.x += d.vx;
                    d.y += d.vy;
                    // Hit the bottom — stick to paint canvas
                    if (d.y >= canvas.height - 2) {
                        if (paintCtx) {
                            paintCtx.fillStyle = d.color;
                            const r = d.size * (0.6 + Math.random() * 0.4);
                            paintCtx.beginPath();
                            paintCtx.arc(d.x, canvas.height - 2, r, 0, Math.PI * 2);
                            paintCtx.fill();
                        }
                        return false;
                    }
                    return true;
                });
                // Done when all drops have landed and no more spawning
                if (paintRainTimer <= 0 && paintRainDrops.length === 0) {
                    paintRainActive = false;
                }
            }
        }
        
        // Render game
        function draw() {
            // Screen shake
            ctx.save();
            if (screenShake > 0 && gameState === 'playing') {
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }
            
            // Clear screen with dark background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === 'menu') {
                drawMenu();
            } else if (gameState === 'playing') {
                // Clean white background — no stars
                
                // Draw arena border (subtle)
                ctx.save();
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
                ctx.restore();
                
                // Draw game objects
                // Draw order: trails (paint) → particles → lasers → enemies → player
                // Draw accumulated paint bitmap first
                if (paintCanvas) ctx.drawImage(paintCanvas, 0, 0);
                // Draw this frame's new trails on top (same fillRect look)
                fireTrails.forEach(trail => trail.draw());
                // Bake new trails into bitmap and clear array
                if (paintCtx && fireTrails.length > 0) {
                    fireTrails.forEach(trail => {
                        paintCtx.fillStyle = trail.color;
                        paintCtx.fillRect(trail.x - trail.size, trail.y - trail.size, trail.size * 2, trail.size * 2);
                    });
                    fireTrails = [];
                }
                // Update and draw chromie wave UNDER enemies
                if (activeChromieWave) {
                    const wave = activeChromieWave;
                    wave.radius += wave.speed;
                    wave.colorIndex = (wave.colorIndex + 0.2) % wave.colors.length;
                    
                    // Check collision with enemies
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        const dx = enemy.x - wave.x;
                        const dy = enemy.y - wave.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist <= wave.radius && dist >= wave.radius - wave.speed) {
                            let basePoints = 100;
                            if (enemy.tier === 2) basePoints = 200;
                            else if (enemy.tier === 3) basePoints = 300;
                            else if (enemy.tier === 4) basePoints = 500;
                            else if (enemy.tier === 5) basePoints = 1000;
                            
                            const points = basePoints * (playerBuffs.diamond > 0 ? 2 : 1);
                            score += points;
                            killCount++;
                            onEnemyKill();
                            
                            if (enemy.isDarkBoss) spawnDarkSplat(enemy.x, enemy.y); else if (enemy.isBoss) spawnWhitePaintBomb(enemy.x, enemy.y); else spawnPixelDeath(enemy.x, enemy.y, enemy.favoriteColor);
                            
                            playSound('enemy-death');
                            playSound('kill-sound');
                            enemies.splice(i, 1);
                        }
                    }
                    
                    // Draw the wave (renders under enemies)
                    ctx.save();
                    ctx.strokeStyle = wave.colors[Math.floor(wave.colorIndex)];
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                    
                    if (wave.radius >= wave.maxRadius) {
                        activeChromieWave = null;
                    }
                }
                
                particles.forEach(particle => particle.draw());
                projectiles.forEach(proj => proj.draw());
                enemies.forEach(enemy => enemy.draw());
                
                // Draw paint rain
                if (paintRainActive && paintRainDrops.length > 0) {
                    paintRainDrops.forEach(d => {
                        ctx.fillStyle = d.color;
                        ctx.beginPath();
                        ctx.ellipse(d.x, d.y, d.size * 0.5, d.size, 0, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
                
                // Draw chrome drops (squiggle icon)
                chromeDrops.forEach(drop => {
                    ctx.save();
                    const pulse = 0.8 + Math.sin(Date.now() * 0.008) * 0.2;
                    const sz = drop.size * 2 * pulse;
                    // Rainbow glow behind icon
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsl(${drop.hue}, 100%, 60%)`;
                    if (sprites.chromieIcon && sprites.chromieIcon.complete) {
                        ctx.drawImage(sprites.chromieIcon, drop.x - sz/2, drop.y - sz/2, sz, sz);
                    } else {
                        // Fallback circle
                        ctx.beginPath();
                        ctx.arc(drop.x, drop.y, drop.size * pulse, 0, Math.PI * 2);
                        ctx.fillStyle = `hsl(${drop.hue}, 100%, 50%)`;
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                    ctx.restore();
                });
                player.draw();
                
                // Aim indicator removed — lasers are the feedback
                
                // Draw UI
                drawUI();
                
                // Pause overlay
                if (gamePaused) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillRect(0, TOOLBAR_H, canvas.width, canvas.height - TOOLBAR_H);
                    ctx.font = 'italic 22px Georgia, serif';
                    ctx.fillStyle = '#888';
                    ctx.textAlign = 'center';
                    ctx.fillText('paused', canvas.width/2, canvas.height/2);
                }
                
                // UI elements removed for clean art look
                
                // Test mode indicator removed for polish
                // if (testMode) {
                //     ctx.fillStyle = '#ff4400';
                //     ctx.font = 'bold 24px Arial';
                //     ctx.textAlign = 'center';
                //     ctx.fillText('TEST MODE', canvas.width / 2, 40);
                // }
                
                // Draw split-screen zone indicators
                drawZoneIndicators();
            } else if (gameState === 'dying') {
                // Keep showing the canvas with paint during death sequence
                ctx.save();
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
                ctx.restore();
                
                // Draw accumulated paint
                if (paintCanvas) ctx.drawImage(paintCanvas, 0, 0);
                fireTrails.forEach(trail => trail.draw());
                // Bake trails
                if (paintCtx && fireTrails.length > 0) {
                    fireTrails.forEach(trail => {
                        paintCtx.fillStyle = trail.color;
                        paintCtx.fillRect(trail.x - trail.size, trail.y - trail.size, trail.size * 2, trail.size * 2);
                    });
                    fireTrails = [];
                }
                
                // Draw drifting pixels
                dyingDriftPixels.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                });
                
                // Slow fade to white as death sequence progresses
                const dyingElapsed = (Date.now() - dyingStartTime) / 1000;
                const fadeAlpha = Math.max(0, (dyingElapsed - 1.5) * 0.3); // start fading at 1.5s
                if (fadeAlpha > 0) {
                    ctx.fillStyle = `rgba(255,255,255,${Math.min(0.6, fadeAlpha)})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            } else if (gameState === 'gallery') {
                drawHangMode();
            } else if (gameState === 'gameOver') {
                drawGameOver();
            }
            
            ctx.restore();
        }
        
        // Draw menu screen
        // ===== DEATH PAINT TITLE SCREEN =====
        const titleImg = new Image();
        titleImg.src = 'death-paint-title.jpg';

        function drawMenu() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (titleImg.complete && titleImg.naturalWidth) {
                // Scale image to fit width, centered at top

                const iw = titleImg.naturalWidth * scale;
                const ih = titleImg.naturalHeight * scale;

        // Draw game over screen
        const artTitles = [

        ];
        let currentArtTitle = '';

        function saveArtwork() {
            if (!capturedArt) return;
            capturedArt.toBlob(async blob => {
                const file = new File([blob], (currentArtTitle || 'moonbird-art').replace(/[^a-zA-Z0-9 #]/g, '') + '.png', { type: 'image/png' });
                // Try Web Share API first (iOS saves to camera roll via share sheet)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({ files: [file] });
                        return;
                    } catch(e) { /* user cancelled or failed, fall through */ }
                }
                // Fallback: download link
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }
        
        function drawGameOver() {
            // Fade in timing
            const elapsed = (Date.now() - gameOverTime) / 1000;
            const fadeIn = Math.min(1, elapsed / 1.5);
            
            // Gallery wall background
            const wallColor = `rgba(245,240,232,${fadeIn * 0.95})`;
            ctx.fillStyle = wallColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (fadeIn < 0.3) return;
            
            // Subtle wall texture
            if (fadeIn > 0.5) {
                ctx.strokeStyle = `rgba(200,190,175,${(fadeIn - 0.5) * 0.15})`;
                ctx.lineWidth = 0.5;
                for (let y = 0; y < canvas.height; y += 8) {
                    ctx.beginPath();
                    ctx.moveTo(0, y + Math.sin(y * 0.1) * 0.5);

            const contentAlpha = Math.min(1, (fadeIn - 0.3) / 0.7);

            ctx.fillText(`${canvasCoverage}% canvas covered  ·  ${killCount} kills`, cx, labelY + 20);
            
            // Buttons
            if (elapsed > 2) {
                const btnY = labelY + 38;
                const btnW = 130, btnH = 34;
                
                // Save button — centered
                saveButtonRect = { x: cx - btnW/2, y: btnY, w: btnW, h: btnH };
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.roundRect(saveButtonRect.x, btnY, btnW, btnH, 8);
                ctx.fill();
                ctx.font = 'bold 12px Arial';
                ctx.fillStyle = '#ffffff';
                ctx.fillText('save to photos', cx, btnY + 22);
            }
            
            // Tap to paint again
            if (elapsed > 4) {
                const pulse = 0.4 + (Math.sin(Date.now() * 0.003) + 1) * 0.3;
                ctx.globalAlpha = contentAlpha * pulse;
                ctx.font = '12px Arial';
                ctx.fillStyle = '#bbbbbb';
                ctx.fillText('tap to paint again', cx, labelY + 100);
            }
            
            ctx.restore();
        }
        
        function drawHangMode() {
            // Gallery wall — warm off-white with subtle texture
            const wallColor = '#f5f0e8';
            ctx.fillStyle = wallColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Subtle wall texture — faint horizontal lines
            ctx.strokeStyle = 'rgba(200,190,175,0.15)';
            ctx.lineWidth = 0.5;
            for (let y = 0; y < canvas.height; y += 8) {
                ctx.beginPath();
                ctx.moveTo(0, y + Math.sin(y * 0.1) * 0.5);
                ctx.lineTo(canvas.width, y + Math.cos(y * 0.1) * 0.5);
                ctx.stroke();
            }
            
            if (!capturedArt) return;
            
            // Frame dimensions — painting centered with generous wall space
            const maxW = canvas.width * 0.65;
            const maxH = canvas.height * 0.55;
            const artRatio = capturedArt.width / capturedArt.height;
            let artW, artH;
            if (artRatio > maxW / maxH) {
                artW = maxW; artH = maxW / artRatio;
            } else {
                artH = maxH; artW = maxH * artRatio;
            }
            const artX = (canvas.width - artW) / 2;
            const artY = (canvas.height - artH) / 2 - 30;
            
            // Drop shadow behind frame
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 4;
            ctx.shadowOffsetY = 6;
            
            // Thick wooden frame
            const frameW = 12;
            ctx.fillStyle = '#3d2b1a'; // dark wood
            ctx.fillRect(artX - frameW, artY - frameW, artW + frameW*2, artH + frameW*2);
            
            // Inner frame highlight
            ctx.fillStyle = '#5a3f2b'; // lighter wood
            ctx.fillRect(artX - frameW + 3, artY - frameW + 3, artW + frameW*2 - 6, artH + frameW*2 - 6);
            
            // Inner dark edge
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(artX - 2, artY - 2, artW + 4, artH + 4);
            
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // The painting itself
            ctx.drawImage(capturedArt, artX, artY, artW, artH);
            
            // Museum label underneath
            const labelY = artY + artH + frameW + 30;
            ctx.textAlign = 'center';
            const cx = canvas.width / 2;
            
            // Title in italic
            ctx.font = 'italic 16px Georgia, serif';
            ctx.fillStyle = '#444444';
            ctx.fillText(currentArtTitle || 'Untitled', cx, labelY);
            
            // Coverage as medium info
            ctx.font = '12px Georgia, serif';
            ctx.fillStyle = '#888888';
            ctx.fillText(`${canvasCoverage}% canvas covered`, cx, labelY + 22);
            
            // "made with Death Paint" — gallery attribution
            ctx.font = '10px Georgia, serif';
            ctx.fillStyle = '#aaaaaa';
            ctx.fillText('made with Death Paint', cx, labelY + 40);
            
            // Back / save buttons
            ctx.font = 'bold 12px Arial';
            const backText = galleryReturnState === 'playing' ? '← keep painting' : '← back';
            const saveText = 'save to photos';
            
            // Back button (top left)
            ctx.textAlign = 'left';
            ctx.fillStyle = '#999999';
            ctx.fillText(backText, 20, 30);
            hangButtonRect = { x: 5, y: 10, w: 80, h: 30 }; // reuse for back tap
            
            // Save button (top right)  
            ctx.textAlign = 'right';
            ctx.fillStyle = '#999999';
            ctx.fillText(saveText, canvas.width - 20, 30);
            saveButtonRect = { x: canvas.width - 140, y: 10, w: 130, h: 30 };
        }

        // Draw UI — classy top bar
        let hangBtnGameRect = null;
        let pauseBtnRect = null;
        let endBtnRect = null;
        const TOOLBAR_H = 44;
        
        function drawUI() {
            // White bar at top — clean, gallery-like
            ctx.save();
            
            // Solid white bar
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, TOOLBAR_H);
            
            // Subtle bottom edge
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, TOOLBAR_H - 0.5);
            ctx.lineTo(canvas.width, TOOLBAR_H - 0.5);
            ctx.stroke();
            
            const btnH = 30, btnY2 = (TOOLBAR_H - btnH) / 2;
            const cx = canvas.width / 2;
            const gap = 20;
            
            // Two buttons centered: pause (left) + hang (right)
            const pauseW = canvas.width * 0.3;
            const hangW = canvas.width * 0.3;
            const totalW = pauseW + hangW + gap;
            const startX = (canvas.width - totalW) / 2;
            
            // Pause button
            const pauseX = startX;
            pauseBtnRect = { x: pauseX, y: btnY2, w: pauseW, h: btnH };
            ctx.fillStyle = 'rgba(0,0,0,0.04)';
            ctx.beginPath();
            ctx.roundRect(pauseX, btnY2, pauseW, btnH, 6);
            ctx.fill();
            ctx.font = 'italic 13px Georgia, serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#999';
            ctx.fillText('pause', pauseX + pauseW/2, btnY2 + 20);
            
            // Hang button — slightly warmer
            const hangX = startX + pauseW + gap;
            hangBtnGameRect = { x: hangX, y: btnY2, w: hangW, h: btnH };
            ctx.fillStyle = 'rgba(74,53,32,0.08)';
            ctx.beginPath();
            ctx.roundRect(hangX, btnY2, hangW, btnH, 6);
            ctx.fill();
            ctx.font = 'italic 13px Georgia, serif';
            ctx.fillStyle = '#4a3520';
            ctx.fillText('hang', hangX + hangW/2, btnY2 + 20);
            
            // No end button — hang IS the end
            endBtnRect = null;
            
            // Kill streak indicator (if active)
            if (streakCount > 0) {
                ctx.globalAlpha = 0.6;
                ctx.font = '10px Arial';
                ctx.fillStyle = '#888';
                ctx.textAlign = 'left';
                const dots = '●'.repeat(Math.min(streakCount, 10));
                const remaining = 10 - Math.min(streakCount, 10);
                const empties = '○'.repeat(remaining);
                ctx.fillText(dots + empties, 8, TOOLBAR_H/2 + 3);
            }
            
            ctx.restore();
        }
        
        // Draw split-screen zone indicators
        function drawZoneIndicators() {
            // Only show on mobile screens and when playing
            if (window.innerWidth > 768 || gameState !== 'playing') return;
            
            ctx.save();
            
            // Vertical divider line down the middle (very faint)
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            
            // Zone labels removed — toolbar covers that area
            
            ctx.restore();
        }
        
        // Input event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') e.preventDefault();
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            mouse.lastMoveTime = Date.now(); // Track when mouse was last moved
        });
        
        canvas.addEventListener('mousedown', (e) => {
            mouse.down = true;
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            handleClick();
        });
        
        canvas.addEventListener('mouseup', () => {
            mouse.down = false;
        });
        
        // Split-screen dual-zone touch control system
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        
        function handleTouchStart(e) {
            e.preventDefault();
            initAudio();
            if (gameState === 'gallery') {
                // In gallery view — check buttons
                if (e.touches.length > 0) {
                    const t = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    mouse.x = t.clientX - rect.left;
                    mouse.y = t.clientY - rect.top;
                    handleClick();
                }
                return;
            }
            if (gameState !== 'playing') {
                // Handle menu/game over clicks
                if (e.touches.length > 0) {
                    const touch_event = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    mouse.x = touch_event.clientX - rect.left;
                    mouse.y = touch_event.clientY - rect.top;
                    handleClick();
                }
                return;
            }
            // Check toolbar buttons during gameplay
            if (e.touches.length > 0) {
                const t = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const tx = t.clientX - rect.left;
                const ty = t.clientY - rect.top;
                
                const inBtn = (btn) => btn && tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h;
                
                if (inBtn(hangBtnGameRect)) {
                    hangArtMidGame();
                    return;
                }
                if (inBtn(pauseBtnRect)) {
                    gamePaused = !gamePaused;
                    playSound('menu-tap');
                    return;
                }
                if (inBtn(endBtnRect)) {
                    // End game early — trigger death sequence
                    player.health = 0;
                    playSound('menu-tap');
                    return;
                }
                // If touch is in toolbar area (top), don't pass to game controls
                if (ty <= TOOLBAR_H) return;
            }
            
            // Show zone labels when first touching
            if (zoneLabelsVisible === 0) {
                zoneLabelsVisible = 180; // 3 seconds at 60fps
            }
            
            const rect = canvas.getBoundingClientRect();
            const centerX = canvas.width / 2;
            
            // Process each new touch
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;
                
                // Determine which zone this touch belongs to
                if (touchX < centerX) {
                    // Left zone (movement)
                    if (!leftZone.active) {
                        leftZone.active = true;
                        leftZone.touchId = touch.identifier;
                        leftZone.startX = touchX;
                        leftZone.startY = touchY;
                        leftZone.currentX = touchX;
                        leftZone.currentY = touchY;
                        leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                } else {
                    // Right zone (shooting)
                    if (!rightZone.active) {
                        rightZone.active = true;
                        rightZone.touchId = touch.identifier;
                        rightZone.startX = touchX;
                        rightZone.startY = touchY;
                        rightZone.currentX = touchX;
                        rightZone.currentY = touchY;
                        rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                }
            }
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if (gameState !== 'playing') return;
            
            const rect = canvas.getBoundingClientRect();
            
            // Process each moving touch
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;
                
                // Check if this touch belongs to left zone
                if (leftZone.active && leftZone.touchId === touch.identifier) {
                    leftZone.currentX = touchX;
                    leftZone.currentY = touchY;
                    
                    // Calculate direction vector from start to current position
                    const dx = leftZone.currentX - leftZone.startX;
                    const dy = leftZone.currentY - leftZone.startY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // Apply dead zone
                    if (distance > leftZone.deadZone) {
                        const angle = Math.atan2(dy, dx);
                        leftZone.currentDirection = {
                            x: dx / distance,
                            y: dy / distance,
                            angle: angle
                        };
                    } else {
                        leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                }
                
                // Check if this touch belongs to right zone
                if (rightZone.active && rightZone.touchId === touch.identifier) {
                    rightZone.currentX = touchX;
                    rightZone.currentY = touchY;
                    
                    // Calculate direction vector from start to current position
                    const dx = rightZone.currentX - rightZone.startX;
                    const dy = rightZone.currentY - rightZone.startY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // Apply dead zone
                    if (distance > rightZone.deadZone) {
                        const angle = Math.atan2(dy, dx);
                        rightZone.currentDirection = {
                            x: dx / distance,
                            y: dy / distance,
                            angle: angle
                        };
                    } else {
                        rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                }
            }
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            if (gameState !== 'playing') return;
            
            // Process each ended touch
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                // Check if this touch belongs to left zone (movement)
                if (leftZone.active && leftZone.touchId === touch.identifier) {
                    leftZone.active = false;
                    leftZone.touchId = null;
                    leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
                }
                
                // Check if this touch belongs to right zone (shooting)
                if (rightZone.active && rightZone.touchId === touch.identifier) {
                    rightZone.active = false;
                    rightZone.touchId = null;
                    rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
                }
            }
        }
        
        function handleClick() {
            try {
                initAudio(); // Init AudioContext on first user gesture (mobile requirement)
                if (gameState === 'menu') {
                    playSound('menu-tap');
                    startGame();
                } else if (gameState === 'gallery') {
                    const cx = mouse.x, cy = mouse.y;
                    // Save button in gallery
                    if (saveButtonRect) {
                        if (cx >= saveButtonRect.x && cx <= saveButtonRect.x + saveButtonRect.w &&
                            cy >= saveButtonRect.y && cy <= saveButtonRect.y + saveButtonRect.h) {
                            saveArtwork();
                            return;
                        }
                    }
                    // Back button — return to game
                    if (hangButtonRect) {
                        if (cx >= hangButtonRect.x && cx <= hangButtonRect.x + hangButtonRect.w &&
                            cy >= hangButtonRect.y && cy <= hangButtonRect.y + hangButtonRect.h) {
                            gameState = galleryReturnState || 'playing';
                            hangMode = false;
                            playSound('menu-tap');
                            return;
                        }
                    }
                    return; // Gallery view — only buttons work
                } else if (gameState === 'gameOver') {
                    const cx = mouse.x, cy = mouse.y;
                    // Save button
                    if (saveButtonRect) {
                        if (cx >= saveButtonRect.x && cx <= saveButtonRect.x + saveButtonRect.w &&
                            cy >= saveButtonRect.y && cy <= saveButtonRect.y + saveButtonRect.h) {
                            saveArtwork();
                            return;
                        }
                    }
                    if (Date.now() - gameOverTime < 4000) return;
                    playSound('menu-tap');
                    restartGame();
                }
            } catch(e) {
                // Show error on canvas for mobile debugging
                ctx.fillStyle = 'red';
                ctx.font = '14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('ERROR: ' + e.message, 10, 50);
                console.error('handleClick error:', e);
            }
        }
        
        function startGame() {
            currentArtTitle = '';
            currentDeathMessage = '';
            capturedArt = null;
            canvasCoverage = 0;
            hangMode = false;
            gamePaused = false;
            streakCount = 0;
            paintRainActive = false;
            paintRainDrops = [];
            paintRainTimer = 0;
            soundDefs._killNote = 0; // Reset musical kill scale
            saveButtonRect = null;
            chromeDrops = [];
            dyingDriftPixels = [];
            dyingEnemiesExploded = false;
            rainbowActive = false;
            rainbowTimer = 0;
            lastChromeDrop = Date.now();
            gameState = 'playing';
            startMusic();
            score = 0;
            killCount = 0;
            lives = 3;
            
            // Reset game variables
            gameStartTime = Date.now();
            gameTime = 0;
            enemySpeedMultiplier = 1;
            playerSpeedBonus = 0;
            
            // Reset player
            player = new Player(canvas.width / 2, canvas.height / 2);
            
            // Clear arrays
            enemies = [];
            projectiles = [];
            enemyProjectiles = [];
            powerUps = [];
            particles = [];
            rainParticles = [];
            fireTrails = [];
            // Init paint bitmap
            paintCanvas = document.createElement('canvas');
            paintCanvas.width = canvas.width;
            paintCanvas.height = canvas.height;
            paintCtx = paintCanvas.getContext('2d');
            groundFlames = [];
            
            // Reset buffs
            playerBuffs = {
                diamond: 0,
                duck: 0,
                skully: 0,
                halo: 0,
                raincloud: 0,
                flame: 0
            };
            
            // Reset touch controls
            leftZone.active = false;
            leftZone.touchId = null;
            leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
            rightZone.active = false;
            rightZone.touchId = null;
            rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
            zoneLabelsVisible = 0;
            lastAutoFireTime = 0;
            
            // Initialize stars and reset continuous spawning
            if (stars.length === 0) initStars();
            lastEnemySpawnTime = Date.now();
            nextSpawnDelay = 1000; // Start spawning after 1 second
        }
        
        function restartGame() {
            startGame();
        }
        
        // Main game loop
        function gameLoop() {
            try {
                update();
                draw();
            } catch(e) {
                ctx.fillStyle = 'red';
                ctx.font = '14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('CRASH: ' + e.message, 10, 80);
                ctx.fillText('at: ' + e.stack?.split('\n')[1]?.trim(), 10, 100);
                console.error('Game loop crash:', e);
            }
            requestAnimationFrame(gameLoop);
        }
        
        // Initialize and start
        async function init() {
            // Show loading screen
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Loading sprites...', canvas.width / 2, canvas.height / 2);
            
            try { 
                await Promise.race([
                    loadSprites(),
                    new Promise(resolve => setTimeout(resolve, 5000)) // 5s timeout
                ]);
            } catch(e) { console.warn('Sprite load error (non-fatal):', e); }
            
            // Set initial mouse position
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2;
            
            gameLoop();
        }
        
        init();
    </script>
</body>
</html>
