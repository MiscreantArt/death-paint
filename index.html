<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Death Paint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100dvh;
            background: #ffffff;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        canvas {
            display: block;
            background: #ffffff;
            image-rendering: pixelated;
        }
        /* Desktop: add subtle border */
        @media (min-width: 769px) {
            body { align-items: center; }
            canvas { border: 2px solid #cccccc; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
    
    <!-- Mobile controls: whole screen is now the control surface -->

    <script>
        // Game setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas sizing - full screen on mobile
        // Use visualViewport API to get actual visible area (excludes browser chrome)
        function getViewportSize() {
            if (window.visualViewport) {
                return { w: window.visualViewport.width, h: window.visualViewport.height };
            }
            return { w: window.innerWidth, h: window.innerHeight };
        }
        function resizeCanvas() {
            const vp = getViewportSize();
            if (vp.w <= 768) {
                // Mobile: fill entire visible viewport, no gaps
                canvas.width = vp.w;
                canvas.height = vp.h;
                canvas.style.width = vp.w + 'px';
                canvas.style.height = vp.h + 'px';
            } else {
                // Desktop: maintain aspect ratio with padding
                canvas.width = Math.min(1024, vp.w - 40);
                canvas.height = Math.min(768, vp.h - 40);
                canvas.style.width = '';
                canvas.style.height = '';
            }
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', resizeCanvas);
        }

        // Game state
        let gameState = 'menu'; // menu, playing, dying, gameOver, gallery
        let dyingStartTime = 0;
        let dyingEnemiesExploded = false;
        let dyingDriftPixels = []; // pixels that drift outward after death
        let score = 0;
        let killCount = 0;
        let streakCount = 0; // Kills without getting hit — resets on damage
        let paintRainActive = false;
        let paintRainDrops = [];
        let paintRainTimer = 0;
        let gamePaused = false;
        
        // Kill streak → paint rain system
        function onEnemyKill() {
            streakCount++;
            // At 10 streak, trigger paint rain
            if (streakCount >= 10 && !paintRainActive) {
                triggerPaintRain();
                streakCount = 0;
            }
        }
        
        function triggerPaintRain() {
            paintRainActive = true;
            paintRainTimer = 60; // Only spawn drops for 1 second, then let them fall and settle
            paintRainDrops = [];
            // Musical celebration — ascending major arpeggio
            const celebNotes = [523, 659, 784, 1047, 1319, 1568];
            celebNotes.forEach((note, i) => {
                setTimeout(() => {
                    synthTone(note, 0.3, 0.15, 'sine');
                    synthTone(note * 0.5, 0.2, 0.08, 'sine');
                }, i * 80);
            });
            // Final chord
            setTimeout(() => {
                synthChord([523, 659, 784, 1047], 0.8, 0.2, 'sine');
            }, celebNotes.length * 80);
            haptic([15, 10, 15, 10, 15, 10, 30]);
        }
        let lives = 3;
        let screenShake = 0;
        let testMode = true; // Test mode always on
        
        // Game progression features
        let gameTime = 0; // Game time in seconds for progressive difficulty
        let gameStartTime = 0; // Track when game started
        
        // Chrome power-up system
        let chromeDrops = []; // Active chrome pickups on screen
        let rainbowActive = false; // Player has rainbow tracer
        let rainbowTimer = 0; // Frames remaining
        let rainbowHue = 0; // Cycling hue
        const RAINBOW_DURATION = 600; // ~10 seconds at 60fps
        let lastChromeDrop = 0; // Timestamp of last drop
        let enemySpeedMultiplier = 1; // Progressive difficulty
        let playerSpeedBonus = 0; // Progressive player speed
        
        // Input handling
        const keys = {};
        const mouse = { x: 0, y: 0, down: false, lastMoveTime: 0 };
        
        // Split-screen dual-zone touch control system
        const leftZone = {
            active: false,
            touchId: null,
            startX: 0,
            startY: 0,
            currentX: 0,
            currentY: 0,
            currentDirection: { x: 0, y: 0, angle: 0 },
            deadZone: 8
        };
        
        const rightZone = {
            active: false,
            touchId: null,
            startX: 0,
            startY: 0,
            currentX: 0,
            currentY: 0,
            currentDirection: { x: 0, y: 0, angle: 0 },
            deadZone: 8
        };
        
        // UI labels fade timer
        let zoneLabelsVisible = 0;
        
        // Auto-fire system
        let lastAutoFireTime = 0;
        const autoFireRate = 200; // milliseconds
        
        // Continuous enemy spawning system
        let lastEnemySpawnTime = 0;
        let nextSpawnDelay = 800; // Start fast
        let maxEnemiesOnScreen = 25;
        
        // Game objects arrays
        let player;
        let enemies = [];
        let projectiles = [];
        let enemyProjectiles = [];
        let powerUps = [];
        let particles = [];
        let rainParticles = [];
        let fireTrails = [];
        // Offscreen bitmap — trails get baked here each frame to prevent array bloat
        let paintCanvas = null;
        let paintCtx = null;
        let groundFlames = [];
        let stars = [];
        let activeChromieWave = null;
        
        // ===== SOUND SYSTEM (Synthesized — musical & pleasing) =====
        let audioCtx = null;
        let bgMusic = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // iOS/Safari: AudioContext starts suspended, must resume in user gesture
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startMusic() {
            if (!audioCtx) return;
            stopMusic();
            bgMusic = new Audio('sounds/starshore-save-point.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.15;
            bgMusic.play().catch(() => {});
        }
        function stopMusic() {
            if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; bgMusic = null; }
        }

        // === Haptics ===
        function haptic(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        // === Synth helpers ===
        function synthTone(freq, dur, vol, type, ramp) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type || 'sine';
            o.frequency.setValueAtTime(freq, t);
            if (ramp) o.frequency.exponentialRampToValueAtTime(ramp, t + dur);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t); o.stop(t + dur);
        }

        function synthNoise(dur, vol, filterFreq) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const bufSize = audioCtx.sampleRate * dur;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.setValueAtTime(filterFreq || 3000, t);
            filt.frequency.exponentialRampToValueAtTime(200, t + dur);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
            src.start(t); src.stop(t + dur);
        }

        function synthChord(freqs, dur, vol, type) {
            freqs.forEach(f => synthTone(f, dur, vol / freqs.length, type || 'sine'));
        }

        // === Sound throttling ===
        const soundThrottles = {};
        const throttleMs = { 'laser-shoot': 120, 'enemy-hit': 60, 'kill-sound': 60, 'enemy-death': 40 };

        // === Sound definitions (all synthesized) ===
        const soundDefs = {
            'laser-shoot': () => {
                // Soft pluck — like a muted guitar string or marimba tap
                // Low, warm, percussive — NOT a zap or laser
                const notes = [392, 440, 494, 523, 587]; // G4-D5 range, warm
                const note = notes[Math.floor(Math.random() * notes.length)];
                const t = audioCtx.currentTime;
                // Attack: instant, decay: fast but smooth
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(note, t);
                o.frequency.setValueAtTime(note * 0.98, t + 0.06); // slight pitch drop = pluck feel
                g.gain.setValueAtTime(0.09, t);
                g.gain.setValueAtTime(0.07, t + 0.01); // fast initial decay
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(t); o.stop(t + 0.12);
                // Quiet body tone underneath
                synthTone(note * 0.5, 0.08, 0.03, 'sine');
                haptic(4);
            },
            'enemy-hit': () => {
                // Soft thud — satisfying impact
                synthTone(180, 0.1, 0.12, 'sine', 60);
                synthNoise(0.05, 0.06, 1200);
                haptic(12);
            },
            'enemy-death': () => {
                // Musical paint pop — each kill plays next note in pentatonic scale
                // Creates an ascending melody as you kill enemies
                const scale = [262, 294, 330, 392, 440, 523, 587, 659, 784, 880, 1047];
                if (!soundDefs._killNote) soundDefs._killNote = 0;
                const note = scale[soundDefs._killNote % scale.length];
                soundDefs._killNote++;
                synthTone(note, 0.15, 0.22, 'sine');
                synthTone(note * 2, 0.1, 0.1, 'sine'); // octave shimmer
                synthNoise(0.04, 0.1, 2000); // soft pop
                haptic(15);
            },
            'kill-sound': () => {
                // Complementary chime — fifth above the last kill note
                const scale = [262, 294, 330, 392, 440, 523, 587, 659, 784, 880, 1047];
                const note = scale[(soundDefs._killNote || 0) % scale.length];
                synthTone(note * 1.5, 0.08, 0.08, 'sine');
            },
            'player-hit': () => {
                // Low warning thump
                synthTone(110, 0.15, 0.2, 'sine', 55);
                synthNoise(0.08, 0.1, 600);
                haptic([30, 20, 30]);
            },
            'player-death': () => {
                // THE FINAL BRUSHSTROKE — grand, orchestral bloom
                // 1. Impact — big paint splat, felt in the body
                synthNoise(0.2, 0.2, 4000);
                synthTone(80, 0.15, 0.15, 'sine', 40);  // sub bass hit
                synthTone(160, 0.1, 0.1, 'sine', 80);
                
                // 2. Silence gap — let the impact breathe (200ms)
                
                // 3. The Bloom — layered chord rises out of silence
                setTimeout(() => {
                    // Low foundation
                    synthTone(131, 3.0, 0.1, 'sine');    // C3 — deep warmth
                    synthTone(262, 2.8, 0.12, 'sine');   // C4 — body
                }, 250);
                setTimeout(() => {
                    // Chord fills in — Cmaj7 spreading upward
                    synthTone(330, 2.5, 0.1, 'sine');    // E4
                    synthTone(392, 2.3, 0.09, 'sine');   // G4
                    synthTone(494, 2.0, 0.07, 'sine');   // B4 — the color
                }, 400);
                setTimeout(() => {
                    // Upper octave doubles — the grand moment
                    synthTone(523, 1.8, 0.08, 'sine');   // C5
                    synthTone(659, 1.6, 0.06, 'sine');   // E5
                    synthTone(784, 1.4, 0.05, 'sine');   // G5
                }, 600);
                // 4. Shimmer — crystalline harmonics
                setTimeout(() => {
                    synthTone(1047, 1.2, 0.04, 'sine');  // C6
                    synthTone(1319, 1.0, 0.03, 'sine');  // E6
                    synthTone(1568, 0.8, 0.025, 'sine'); // G6
                    synthTone(1976, 0.6, 0.015, 'sine'); // B6 — sparkle
                }, 800);
                // 5. Final resonance — a single tone that rings out
                setTimeout(() => {
                    synthTone(262, 3.5, 0.06, 'sine');   // C4 rings longest
                    synthTone(131, 4.0, 0.04, 'sine');   // C3 underneath
                }, 1000);
                haptic([50, 30, 70, 40, 100]);
            },
            'game-over': () => {
                // The painting settles — gentle resolution
                // Shift from Cmaj7 to a softer Bbmaj7 (like a sigh)
                setTimeout(() => {
                    synthTone(233, 2.5, 0.08, 'sine');   // Bb3
                    synthTone(294, 2.3, 0.07, 'sine');   // D4
                    synthTone(349, 2.0, 0.06, 'sine');   // F4
                    synthTone(440, 1.8, 0.05, 'sine');   // A4 — maj7
                }, 0);
                // Final single note — everything resolves to one frequency
                setTimeout(() => {
                    synthTone(262, 3.0, 0.06, 'sine');   // C4 — home
                }, 1200);
                haptic([30, 40, 30, 50, 60]);
            },
            'powerup-collect': () => {
                // Bright ascending arpeggio
                synthTone(523, 0.08, 0.1, 'sine');
                setTimeout(() => synthTone(659, 0.08, 0.1, 'sine'), 50);
                setTimeout(() => synthTone(784, 0.08, 0.1, 'sine'), 100);
                setTimeout(() => synthTone(1047, 0.15, 0.12, 'sine'), 150);
                haptic([15, 10, 15, 10, 20]);
            },
            'chromie-shockwave': () => {
                // Big swoosh with rising shimmer
                synthNoise(0.4, 0.15, 4000);
                synthTone(220, 0.5, 0.1, 'sine', 880);
                synthTone(330, 0.5, 0.08, 'triangle', 1320);
                haptic([20, 10, 20, 10, 40]);
            },
            'crown-collect': () => {
                // Royal fanfare — major chord
                synthChord([523, 659, 784], 0.2, 0.15, 'sine');
                setTimeout(() => synthChord([784, 988, 1175], 0.3, 0.12, 'sine'), 150);
                haptic(25);
            },
            'duck-quack': () => {
                // Cartoon quack
                synthTone(300, 0.08, 0.15, 'square', 200);
                setTimeout(() => synthTone(280, 0.1, 0.12, 'square', 180), 100);
                haptic(15);
            },
            'flame-activate': () => {
                // Whoosh ignition
                synthNoise(0.3, 0.12, 5000);
                synthTone(200, 0.2, 0.1, 'sawtooth', 600);
                haptic([10, 5, 10, 5, 30]);
            },
            'halo-activate': () => {
                // Ethereal shimmer
                synthChord([880, 1109, 1319], 0.4, 0.1, 'sine');
                synthTone(1760, 0.3, 0.05, 'sine', 880);
                haptic(20);
            },
            'skully-activate': () => {
                // Dark power-up — low ominous
                synthTone(110, 0.3, 0.15, 'sawtooth', 55);
                synthTone(165, 0.2, 0.1, 'square', 82);
                haptic([30, 15, 30]);
            },
            'raincloud-activate': () => {
                // Gentle rain shimmer
                synthNoise(0.3, 0.08, 2000);
                synthTone(660, 0.2, 0.06, 'sine', 330);
                haptic(15);
            },
            'menu-tap': () => {
                // Clean click
                synthTone(800, 0.04, 0.1, 'sine');
                haptic(5);
            },
            'game-start': () => {
                // Energetic start — ascending major
                synthTone(523, 0.1, 0.1, 'sine');
                setTimeout(() => synthTone(659, 0.1, 0.1, 'sine'), 80);
                setTimeout(() => synthTone(784, 0.1, 0.1, 'sine'), 160);
                setTimeout(() => synthChord([1047, 1319, 1568], 0.3, 0.15, 'sine'), 240);
                haptic([10, 10, 10, 10, 25]);
            },

            'powerup-spawn': () => {
                // Gentle sparkle
                synthTone(1047, 0.1, 0.05, 'sine', 523);
                haptic(5);
            },
            'powerup-expire': () => {
                // Soft descend
                synthTone(660, 0.15, 0.06, 'sine', 330);
            },
            'enemy-whoosh': () => {
                synthNoise(0.12, 0.06, 2500);
            },
            'splat-current': () => {
                // Paint splat — wet pop
                synthNoise(0.1, 0.1, 1800);
                synthTone(150, 0.08, 0.08, 'sine', 60);
                haptic(10);
            },

        };

        function playSound(name) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = performance.now();
            if (throttleMs[name]) {
                if (soundThrottles[name] && now - soundThrottles[name] < throttleMs[name]) return;
                soundThrottles[name] = now;
            }
            // Use synth sounds with throttling and haptics
            const def = soundDefs[name];
            if (def) { try { def(); } catch(e) {} }
        }
        
        // Sprites - new structure for sprite sheets
        const sprites = {
            heroSheet: null,
            enemySheets: {},
            powerUpBirdSheets: {},
            powerUps: {},
            laser: null,
            flame: null,
            flameWalk: []
        };
        
        // Row mapping for sprite sheet layout
        const ROW_MAP = {
            east:  { idle: 0, walk: 1 },
            west:  { idle: 2, walk: 3 },
            north: { idle: 4, walk: 5 },
            south: { idle: 6, walk: 7 }
        };
        
        // Helper function to draw sprites from sprite sheets
        function drawSprite(spriteSheet, direction, animation, frame, x, y, size) {
            if (!spriteSheet || !spriteSheet.complete) return false;
            const dirMap = ROW_MAP[direction] || ROW_MAP['east'];
            if (!dirMap) return false;
            const row = dirMap[animation];
            if (row === undefined) return false;
            const col = frame % 6;
            const cs = 96;
            try {
                ctx.drawImage(spriteSheet, col * cs, row * cs, cs, cs, x - size, y - size, size * 2, size * 2);
                return true;
            } catch(e) {
                return false;
            }
        }
        
        // Power-up types with moonbird mapping
        const powerUpTypes = [
            { type: 'chromie', birdId: 12, color: '#ff00ff', duration: 0 },    // Circle wave kills all enemies
            { type: 'crown', birdId: 952, color: '#ffd700', duration: 0 },     // Score reward (instant +500)
            { type: 'diamond', birdId: 9619, color: '#00ccff', duration: 15000 }, // Double points
            { type: 'duck', birdId: 5568, color: '#ffdd00', duration: 10000 },   // Duck noises (cosmetic joke)
            { type: 'skully', birdId: 8677, color: '#888888', duration: 10000 },  // Death touch - melee kills, but vulnerable to shots
            { type: 'halo', birdId: 6295, color: '#ffd700', duration: 8000 },    // Immunity - can't take damage
            { type: 'raincloud', birdId: 429, color: '#aaccff', duration: 10000 }, // Rain - slows all enemies
            { type: 'flame', birdId: 7861, color: '#ff4400', duration: 10000 }     // Animated flame - damage boost
        ];
        
        // Player buffs
        let playerBuffs = {
            diamond: 0,  // Double points
            duck: 0,     // Cosmetic duck noises
            skully: 0,   // Death touch
            halo: 0,     // Immunity
            raincloud: 0, // Slow enemies
            flame: 0     // Damage boost
        };
        
        // Sprite loading - updated for sprite sheets
        async function loadSprites() {
            // Load hero sprite sheet (bird ID 616)
            sprites.heroSheet = new Image();
            sprites.heroSheet.src = 'sheets/2755.png';
            
            // Wait for hero sheet to load
            await new Promise((resolve) => {
                sprites.heroSheet.onload = resolve;
                sprites.heroSheet.onerror = () => { 
                    console.warn('Failed to load hero sprite sheet'); 
                    resolve(); 
                };
            });
            
            // Pre-load ALL enemy sheets so they have sprites ready
            [3372, 5463, 7473, 9638, 668, 3047, 2941, 8959, 2080, 3904, 8398, 5249, 6949, 1729, 2290].forEach(id => loadEnemySprites(id));
            
            // Preload Moonbird #12 sheet (squiggle bird) + chromie icon for power-up
            sprites.squiggleSheet = new Image();
            sprites.squiggleSheet.src = 'sheets/12.png';
            sprites.chromieIcon = new Image();
            sprites.chromieIcon.src = 'assets/powerup-chromie.png';
        }
        
        // Power-up bird map for hero sprite swapping
        const powerUpBirdMap = {
            'diamond': 9619, 'duck': 5568, 'skully': 8677, 'halo': 6295,
            'raincloud': 429, 'flame': 7861, 'crown': 952, 'chromie': 12
        };
        
        // Lazy-load power-up bird sprite sheets on first collect
        function loadPowerUpBird(powerUpType) {
            if (sprites.powerUpBirdSheets[powerUpType]) return;
            const birdId = powerUpBirdMap[powerUpType];
            if (!birdId) return;
            
            sprites.powerUpBirdSheets[powerUpType] = new Image();
            sprites.powerUpBirdSheets[powerUpType].src = `sheets/${birdId}.png`;
        }
        
        // Lazy-load enemy sprite sheets on first spawn
        function loadEnemySprites(id) {
            if (sprites.enemySheets[id]) return;
            
            const img = new Image();
            img.src = `sheets/${id}.png`;
            sprites.enemySheets[id] = img;
            
            // If image fails or takes too long, retry once
            img.onerror = () => {
                console.warn(`Failed to load sheet ${id}, retrying...`);
                setTimeout(() => {
                    const retry = new Image();
                    retry.src = `sheets/${id}.png?t=${Date.now()}`;
                    sprites.enemySheets[id] = retry;
                }, 1000);
            };
        }
        
        // Particle system
        // Bright pixel colors for death explosions and trails
        const pixelColors = [
            '#ff0055', '#ff4400', '#ffaa00', '#ffff00', '#00ff88',
            '#00ccff', '#4444ff', '#aa00ff', '#ff00ff', '#ff6699',
            '#00ffcc', '#88ff00', '#ff8800', '#ff0000', '#00aaff'
        ];

        // Each grunt favors a color — ~40% of their splat uses it
        const gruntFavoriteColor = {
            3372: '#ff0055',  // hot pink
            5463: '#00ccff',  // cyan
            7473: '#88ff00',  // lime green
            9638: '#ffaa00',  // orange
            668:  '#aa00ff',  // purple
            3047: '#ff4400',  // red-orange
        };

        function pickSplatColor(favoriteColor) {
            if (favoriteColor && Math.random() < 0.4) return favoriteColor;
            return pixelColors[Math.floor(Math.random() * pixelColors.length)];
        }

        function spawnPixelDeath(x, y, favoriteColor) {
            // Temporary burst particles (animated, fade out)
            for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 10;
                particles.push(new Particle(
                    x + (Math.random() - 0.5) * 6,
                    y + (Math.random() - 0.5) * 6,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    pickSplatColor(favoriteColor),
                    15 + Math.floor(Math.random() * 20),
                    0.5 + Math.random() * 1.2
                ));
            }
            // MASSIVE paint bomb — pixels get SMALLER the further from center
            // Big fat core pixels
            for (let i = 0; i < 120; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 25;

        function spawnWhitePaintBomb(x, y) {
            const eraseRadius = 160;
            // Remove any unbaked color trails in current frame's array
            for (let i = fireTrails.length - 1; i >= 0; i--) {
                const dx = fireTrails[i].x - x;
                const dy = fireTrails[i].y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const edgeVariance = eraseRadius * (0.6 + Math.random() * 0.5);
                if (dist < edgeVariance && fireTrails[i].color !== '#ffffff') {
                    fireTrails.splice(i, 1);
                }
            }
            // Dense white core — covers baked pixels underneath
            for (let i = 0; i < 350; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * eraseRadius * 0.8;
                const t = new FireTrail(x + Math.cos(angle) * dist, y + Math.sin(angle) * dist);

                t.color = '#ffffff';
                fireTrails.push(t);

                const fingerLen = eraseRadius + Math.random() * 140;
                const fingerWidth = 10 + Math.random() * 18;
                for (let j = 0; j < 25; j++) {
                    const along = eraseRadius * 0.4 + Math.random() * fingerLen * 0.7;
                    const across = (Math.random() - 0.5) * fingerWidth;
                    const px = x + Math.cos(fingerAngle) * along + Math.cos(fingerAngle + Math.PI/2) * across;
                    const py = y + Math.sin(fingerAngle) * along + Math.sin(fingerAngle + Math.PI/2) * across;
                    const t = new FireTrail(px, py);
                    t.size = 1.2 + Math.random() * 2.5 * (1 - along / (eraseRadius + 110));
                    t.color = '#ffffff';
                    fireTrails.push(t);
                }
            }
            // Random scattered white droplets around edges
            for (let i = 0; i < 60; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = eraseRadius * 0.7 + Math.random() * 80;
                const t = new FireTrail(x + Math.cos(angle) * dist, y + Math.sin(angle) * dist);
                t.size = 0.8 + Math.random() * 1.5;
                t.color = '#ffffff';
                fireTrails.push(t);
            }
        }

        class Particle {

                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = size;

            update() {
                this.x += this.vx;

                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        // Player class
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 38;
                this.speed = 2.5;
                this.health = 3;
                this.animFrame = 0;
                this.animTime = 0;
                this.isMoving = false;
                this.lastShot = 0;
                this.shootDelay = 200;
                this.currentDirection = 'east'; // Track current facing direction
                this.lastAimDirection = 'east'; // Track last aim direction
            }
            
            update() {
                this.isMoving = false;
                let dx = 0, dy = 0;
                
                // Left zone controls movement
                if (leftZone.active && (leftZone.currentDirection.x !== 0 || leftZone.currentDirection.y !== 0)) {
                    // Touch movement - live steering while left finger is down
                    dx = leftZone.currentDirection.x;
                    dy = leftZone.currentDirection.y;
                } else if (!leftZone.active && !rightZone.active) {
                    // Desktop controls - only when not using any touch zones
                    if (keys['w'] || keys['ArrowUp']) dy -= 1;
                    if (keys['s'] || keys['ArrowDown']) dy += 1;
                    if (keys['a'] || keys['ArrowLeft']) dx -= 1;
                    if (keys['d'] || keys['ArrowRight']) dx += 1;
                }
                
                // Apply movement ONLY if there's input
                if (dx !== 0 || dy !== 0) {
                    this.isMoving = true;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    if (length > 0) {
                        dx /= length;
                        dy /= length;
                    }
                    
                    const speed = (this.speed + playerSpeedBonus) * (playerBuffs.speed > 0 ? 1.5 : 1);
                    this.x += dx * speed;
                    this.y += dy * speed;
                    
                    // Keep player in bounds
                    this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                    this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));
                }
                
                // Determine facing direction with correct priority:
                // 1. RIGHT thumb (aim zone) active → face aim direction (highest priority)
                // 2. ONLY LEFT thumb (move zone) active → face movement direction (medium priority)  
                // 3. Neither active → keep last facing direction (lowest priority)
                // Desktop: mouse overrides when actively aiming, movement keys when mouse inactive
                
                const now = Date.now();
                const mouseRecentlyMoved = (now - mouse.lastMoveTime) < 2000; // 2 second threshold
                
                let newDirection = null;
                
                // Priority 1: RIGHT thumb (aim zone) active - highest priority
                if (rightZone.active && (rightZone.currentDirection.x !== 0 || rightZone.currentDirection.y !== 0)) {
                    newDirection = this.getCardinalDirection(rightZone.currentDirection.x, rightZone.currentDirection.y);
                }
                // Priority 1b: Desktop mouse aiming (when mouse recently moved or actively clicking)
                else if (!leftZone.active && !rightZone.active && mouse.x !== undefined && (mouseRecentlyMoved || mouse.down)) {
                    const aimDx = mouse.x - this.x;
                    const aimDy = mouse.y - this.y;
                    if (aimDx !== 0 || aimDy !== 0) {
                        newDirection = this.getCardinalDirection(aimDx, aimDy);
                    }
                }
                // Priority 2: ONLY LEFT thumb (move zone) active - medium priority
                else if (leftZone.active && !rightZone.active && (leftZone.currentDirection.x !== 0 || leftZone.currentDirection.y !== 0)) {
                    newDirection = this.getCardinalDirection(leftZone.currentDirection.x, leftZone.currentDirection.y);
                }
                // Priority 2b: Desktop movement keys (when mouse hasn't moved recently)
                else if (!leftZone.active && !rightZone.active && !mouseRecentlyMoved && (dx !== 0 || dy !== 0)) {
                    newDirection = this.getCardinalDirection(dx, dy);
                }
                
                // Update facing direction or keep last direction (Priority 3)
                if (newDirection !== null) {
                    this.currentDirection = newDirection;
                    this.lastAimDirection = newDirection; // Update last known direction
                } else {
                    // Priority 3: Keep last facing direction
                    this.currentDirection = this.lastAimDirection || 'east';
                }
                
                // Animation
                this.animTime++;
                if (this.animTime % 8 === 0) {
                    this.animFrame = (this.animFrame + 1) % 6;
                }
                
                // Shooting logic
                const shootNow = Date.now();
                
                // Right zone auto-fire: while right thumb is down and dragged past dead zone
                const shouldAutoFire = rightZone.active && (rightZone.currentDirection.x !== 0 || rightZone.currentDirection.y !== 0);
                
                // Manual shooting (desktop) - only when not using touch zones
                const manualShoot = !leftZone.active && !rightZone.active && (mouse.down || keys[' ']);
                
                if (shouldAutoFire && shootNow - lastAutoFireTime > autoFireRate) {
                    this.shoot(rightZone.currentDirection.angle);
                    lastAutoFireTime = shootNow;
                } else if (manualShoot && shootNow - this.lastShot > this.shootDelay) {
                    this.shoot();
                    this.lastShot = shootNow;
                }
            }
            
            // Helper method to determine cardinal direction from a vector
            // Diagonal favors east/west; north/south only when vertical is clearly dominant
            getCardinalDirection(dx, dy) {
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                
                if (absDy > absDx * 2) {
                    // Strongly vertical — use north/south
                    return dy < 0 ? 'north' : 'south';
                } else if (absDx > 0.01) {
                    // Any meaningful horizontal component — use east/west
                    return dx > 0 ? 'east' : 'west';
                } else {
                    return dy < 0 ? 'north' : 'south';
                }
            }
            
            shoot(forceAngle = null) {
                // Use forced angle (mobile auto-fire) or mouse position (desktop)
                const angle = forceAngle !== null ? forceAngle : Math.atan2(mouse.y - this.y, mouse.x - this.x);
                const damage = playerBuffs.flame > 0 ? 2 : 1;
                
                // Laser spawns from the bird's eyes — fixed position based on facing
                // Eyes are ~30% from top of sprite (y - size*0.3 above center)
                const aimDirX = Math.cos(angle);
                const aimDirY = Math.sin(angle);
                
                // Eye position: fixed Y at eye level, slight X offset toward facing
                let eyeOffX = 0;
                if (this.currentDirection === 'east') eyeOffX = this.size * 0.15;
                else if (this.currentDirection === 'west') eyeOffX = -this.size * 0.15;
                const eyeX = this.x + eyeOffX;
                const eyeY = this.y - this.size * 0.3;
                
                // Regular dual laser beams (offset 3-4px perpendicular to travel direction)
                // Two beams, one per eye — offset perpendicular to aim
                const perpX = -Math.sin(angle) * 5;
                const perpY = Math.cos(angle) * 5;
                projectiles.push(new LaserBeam(eyeX + perpX, eyeY + perpY, angle, 14, damage, '#ff2200', 0));
                projectiles.push(new LaserBeam(eyeX - perpX, eyeY - perpY, angle, 14, damage, '#ff2200', 0));
                playSound('laser-shoot');
                
                // Micro screen shake on shooting
                screenShake = 1;
                
                // Duck power-up: Show "QUACK!" text particles instead of normal effects
                if (playerBuffs.duck > 0) {
                    // Create "QUACK!" text particle
                    particles.push(new TextParticle(
                        eyeX + Math.cos(angle) * 20,
                        eyeY + Math.sin(angle) * 20,
                        "QUACK!",
                        '#ffdd00',
                        30
                    ));
                    
                    // Yellow duck particles
                    for (let i = 0; i < 5; i++) {
                        particles.push(new Particle(
                            eyeX + (Math.random() - 0.5) * 8,
                            eyeY + (Math.random() - 0.5) * 8,
                            (Math.random() - 0.5) * 2,
                            (Math.random() - 0.5) * 2,
                            '#ffdd00',
                            12,
                            2
                        ));
                    }
                } else {
                    // Visor glow particles (yellow)
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(
                            eyeX + (Math.random() - 0.5) * 6,
                            eyeY + (Math.random() - 0.5) * 6,
                            (Math.random() - 0.5) * 1,
                            (Math.random() - 0.5) * 1,
                            '#ffdd00',
                            8,
                            1
                        ));
                    }
                }
            }
            
            takeDamage() {
                // Halo immunity - no damage from anything
                if (playerBuffs.halo > 0) {
                    // Show immunity effect
                    for (let i = 0; i < 10; i++) {
                        particles.push(new Particle(
                            this.x + (Math.random() - 0.5) * 50,
                            this.y + (Math.random() - 0.5) * 50,
                            (Math.random() - 0.5) * 2,
                            (Math.random() - 0.5) * 2,
                            '#ffd700',
                            15,
                            2
                        ));
                    }
                    return;
                }
                
                this.health--;
                screenShake = 10;
                
                // Pixel splatter on hit — permanent like trails
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 10 + Math.random() * 40;
                    fireTrails.push(new FireTrail(
                        this.x + Math.cos(angle) * dist,
                        this.y + Math.sin(angle) * dist
                    ));
                }
                // Also burst particles (temporary, for impact feel)
                for (let i = 0; i < 20; i++) {
                    particles.push(new Particle(
                        this.x + (Math.random() - 0.5) * 30,
                        this.y + (Math.random() - 0.5) * 30,
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 8,
                        pixelColors[Math.floor(Math.random() * pixelColors.length)],
                        15,
                        0.8 + Math.random() * 1.2
                    ));
                }
            }
            
            draw() {
                ctx.save();
                
                // Subtle drop shadow below character
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + this.size * 0.8, this.size * 0.4, this.size * 0.1, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Subtle white glow so character pops over painted canvas
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                
                // Draw sprite using sprite sheets
                // Determine which sprite sheet to use based on active power-ups
                // Priority: skully > halo > duck > raincloud > flame > diamond (most visually distinctive first)
                const animationType = this.isMoving ? 'walk' : 'idle';
                let spriteSheet = sprites.heroSheet;
                
                // Squiggle bird override when rainbow tracer active (east-only sheet, force east)
                let forceEast = false;
                if (rainbowActive && sprites.squiggleSheet && sprites.squiggleSheet.complete) {
                    spriteSheet = sprites.squiggleSheet;
                    forceEast = true;
                } else if (playerBuffs.skully > 0 && sprites.powerUpBirdSheets.skully && sprites.powerUpBirdSheets.skully.complete) {
                    spriteSheet = sprites.powerUpBirdSheets.skully;
                } else if (playerBuffs.halo > 0 && sprites.powerUpBirdSheets.halo && sprites.powerUpBirdSheets.halo.complete) {
                    spriteSheet = sprites.powerUpBirdSheets.halo;
                } else if (playerBuffs.duck > 0 && sprites.powerUpBirdSheets.duck && sprites.powerUpBirdSheets.duck.complete) {
                    spriteSheet = sprites.powerUpBirdSheets.duck;
                } else if (playerBuffs.raincloud > 0 && sprites.powerUpBirdSheets.raincloud && sprites.powerUpBirdSheets.raincloud.complete) {
                    spriteSheet = sprites.powerUpBirdSheets.raincloud;
                } else if (playerBuffs.flame > 0 && sprites.powerUpBirdSheets.flame && sprites.powerUpBirdSheets.flame.complete) {
                    spriteSheet = sprites.powerUpBirdSheets.flame;
                } else if (playerBuffs.diamond > 0 && sprites.powerUpBirdSheets.diamond && sprites.powerUpBirdSheets.diamond.complete) {
                    spriteSheet = sprites.powerUpBirdSheets.diamond;
                }
                
                // Use the drawSprite helper function
                const drawDir = forceEast ? 'east' : this.currentDirection;
                // Flip horizontally for west-facing when using east-only sheet
                if (forceEast && this.currentDirection === 'west') {
                    ctx.save();
                    ctx.translate(this.x, 0);
                    ctx.scale(-1, 1);
                    ctx.translate(-this.x, 0);
                    if (!drawSprite(spriteSheet, 'east', animationType, this.animFrame, this.x, this.y, this.size)) {
                        ctx.fillStyle = '#00ffff';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                } else
                if (!drawSprite(spriteSheet, drawDir, animationType, this.animFrame, this.x, this.y, this.size)) {
                    // Ultimate fallback circle
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

            update() {
                // Apply knockback physics
                if (this.knockbackX !== 0 || this.knockbackY !== 0) {
                    this.x += this.knockbackX;
                    this.y += this.knockbackY;
                    this.knockbackX *= 0.8; // Decay knockback
                    this.knockbackY *= 0.8;
                    if (Math.abs(this.knockbackX) < 0.1) this.knockbackX = 0;
                    if (Math.abs(this.knockbackY) < 0.1) this.knockbackY = 0;
                }
                
                // Update hit flash
                if (this.hitFlash > 0) {
                    this.hitFlash--;
                }
                
                // Move toward player
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 0) {
                    // Apply raincloud slowing effect and progressive difficulty
                    const raincloudslow = playerBuffs.raincloud > 0 ? 0.4 : 1;
                    const finalSpeed = this.speed * enemySpeedMultiplier * raincloudslow;
                    this.x += (dx / dist) * finalSpeed;
                    this.y += (dy / dist) * finalSpeed;
                    this.angle = Math.atan2(dy, dx);
                    
                    // Update facing direction toward player
                    this.currentDirection = this.getCardinalDirection(dx, dy);
                    
                    // Drop permanent color pixels — builds up like Jackson Pollock (not for bosses)
                    // Reduced: 1 pixel every 4 frames to prevent canvas saturation
                    if (!this.isBoss && Math.random() < 0.25) {
                        fireTrails.push(new FireTrail(
                            this.x + (Math.random() - 0.5) * 30,
                            this.y + (Math.random() - 0.5) * 20,
                            this.favoriteColor
                        ));
                    }
                    
                    // Drop ground flames less frequently (every 12 frames, cap at 150)
                    if (this.animTime % 12 === 0 && groundFlames.length < 150) {
                        groundFlames.push(new GroundFlame(
                            this.x + (Math.random() - 0.5) * 14,
                            this.y + this.size * 0.4
                        ));
                    }
                }
                
                // Animation — fast legs to match speed
                this.animTime++;
                if (this.animTime % 4 === 0) {
                    this.animFrame = (this.animFrame + 1) % 6;
                }
                
                // Enemies no longer shoot — they charge + leave fire trails
            }
            
            // Helper method to determine cardinal direction from a vector
            // Diagonal favors east/west; north/south only when vertical is clearly dominant
            getCardinalDirection(dx, dy) {
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                
                if (absDy > absDx * 2) {
                    // Strongly vertical — use north/south
                    return dy < 0 ? 'north' : 'south';
                } else if (absDx > 0.01) {
                    // Any meaningful horizontal component — use east/west
                    return dx > 0 ? 'east' : 'west';
                } else {
                    return dy < 0 ? 'north' : 'south';
                }
            }
            
            shoot() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                enemyProjectiles.push(new Projectile(this.x, this.y, angle, 2.8, 1, '#ff4400', true));
                
                // Muzzle flash
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle(
                        this.x + Math.cos(angle) * 15,
                        this.y + Math.sin(angle) * 15,
                        Math.cos(angle) * 2 + (Math.random() - 0.5),
                        Math.sin(angle) * 2 + (Math.random() - 0.5),
                        '#ff4400',
                        8
                    ));
                }
            }
            
            takeDamage(damage, projectileAngle = null) {
                this.health -= damage;
                playSound('enemy-hit');
                
                // Hit flash effect
                this.hitFlash = 3;
                
                // Knockback from projectile
                if (projectileAngle !== null) {
                    const knockbackForce = 8;
                    this.knockbackX = Math.cos(projectileAngle) * knockbackForce;
                    this.knockbackY = Math.sin(projectileAngle) * knockbackForce;
                }
                
                // Damage particles
                for (let i = 0; i < 8; i++) {
                    particles.push(new Particle(
                        this.x + (Math.random() - 0.5) * 30,
                        this.y + (Math.random() - 0.5) * 30,
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 4,
                        '#ffaa00',
                        15
                    ));
                }
                
                return this.health <= 0;
            }
            
            draw() {
                ctx.save();
                
                // Subtle drop shadow below character
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + this.size * 0.8, this.size * 0.35, this.size * 0.09, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Subtle white glow so character pops over painted canvas
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255,255,255,0.7)';
                
                // Hit flash effect
                if (this.hitFlash > 0) {
                    ctx.filter = 'brightness(3)';
                }
                
                // Draw sprite using sprite sheet
                const enemySpriteSheet = sprites.enemySheets[this.spriteId];
                
                // Tier 4 and 5 enemies are bigger
                const sizeMultiplier = this.tier === 5 ? 1.6 : this.tier === 4 ? 1.3 : 1;
                const drawSize = this.size * sizeMultiplier;
                
                // Use the drawSprite helper function
                if (!drawSprite(enemySpriteSheet, this.currentDirection, 'walk', this.animFrame, this.x, this.y, drawSize)) {
                    // Ultimate fallback circle
                    ctx.fillStyle = '#ff4400';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // Projectile class (for enemy projectiles)
        class Projectile {
            constructor(x, y, angle, speed, damage, color, isEnemy = false) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.damage = damage;
                this.color = color;
                this.isEnemy = isEnemy;
                this.life = 120;
                this.animFrame = 0;
                this.animTime = 0;
                this.bounce = 0;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.animTime++;
                if (this.animTime % 10 === 0) {
                    this.animFrame = (this.animFrame + 1) % 6;
                }
                this.bounce += 0.3; // Bobbing motion
                
                return this.life <= 0 || 
                       this.x < 0 || this.x > canvas.width ||
                       this.y < 0 || this.y > canvas.height;
            }
            
            draw() {
                ctx.save();
                
                if (this.isEnemy && sprites.flameWalk && sprites.flameWalk.length > 0) {
                    // Add glow for enemy projectiles
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#ff4400';
                    
                    // Draw animated flame sprite for enemy projectiles (no rotation)
                    const frame = sprites.flameWalk[this.animFrame % sprites.flameWalk.length] || sprites.flame;
                    ctx.translate(this.x, this.y + Math.sin(this.bounce) * 2);
                    ctx.drawImage(frame, -9, -9, 18, 18);
                } else {
                    // This shouldn't be used for player projectiles anymore (using LaserBeam instead)
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        // LaserBeam class (for hero eye lasers using sprite)
        class LaserBeam {
            constructor(x, y, angle, speed, damage, color, offsetY = 0) {
                this.x = x;
                this.y = y + offsetY;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.angle = angle + Math.PI;
                this.damage = damage;
                this.color = color;
                this.life = 120;
                this.age = 0; // Track age for grow-in effect
                this.startX = this.x;
                this.startY = this.y;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.age++;
                
                // No paint trail — color is earned through kills
                
                return this.life <= 0 || 
                       this.x < 0 || this.x > canvas.width ||
                       this.y < 0 || this.y > canvas.height;
            }
            
            draw() {
                ctx.save();
                
                // Cyclops-style red beam — big, bold, unmistakable
                const growProgress = Math.min(1, this.age / 4);
                const scale = 0.3 + growProgress * 0.7;
                const width = 25 * scale;
                const height = 3 * scale;
                
                // Red glow
                ctx.shadowBlur = 8 * scale;
                ctx.shadowColor = '#ff0000';
                
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Scattered white pixels around beam for visibility
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                for (let p = 0; p < 6; p++) {
                    const px = (Math.random() - 0.5) * width;
                    const py = (Math.random() - 0.5) * height * 6;
                    const ps = 1 + Math.random() * 2;
                    ctx.fillRect(px - ps/2, py - ps/2, ps, ps);
                }

                // Always draw red beam (ignore sprite)
                {
                    // White border to make beam pop on any background
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = height * 2.5;
                    ctx.beginPath();
                    ctx.moveTo(-width / 2, 0);
                    ctx.lineTo(width / 2, 0);
                    ctx.stroke();
                    // Outer red glow
                    ctx.strokeStyle = 'rgba(255,0,0,0.4)';
                    ctx.lineWidth = height * 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-width / 2, 0);
                    ctx.lineTo(width / 2, 0);
                    ctx.stroke();
                    // Core beam
                    ctx.strokeStyle = '#ff2200';
                    ctx.lineWidth = height * 0.7;
                    ctx.beginPath();
                    ctx.moveTo(-width / 2, 0);
                    ctx.lineTo(width / 2, 0);
                    ctx.stroke();
                    // Hot center
                    ctx.strokeStyle = '#ff8866';
                    ctx.lineWidth = height * 0.25;
                    ctx.beginPath();
                    ctx.moveTo(-width / 2, 0);
                    ctx.lineTo(width / 2, 0);
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0;
                
                ctx.restore();
            }
        }
        
        // Power-up class
        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.bounce = 0;
                this.life = 600; // 10 seconds at 60fps
            }
            
            update() {
                this.bounce += 0.1;
                this.life--;
                
                // Check collision with player
                const dx = this.x - player.x;
                const dy = this.y - player.y;
                if (dx * dx + dy * dy < 40 * 40) {
                    this.collect();
                    return true;
                }
                
                return this.life <= 0;
            }
            
            collect() {
                const powerUp = powerUpTypes.find(p => p.type === this.type);

                loadPowerUpBird(this.type);

                    case 'chromie':

            createChromieWave() {

                activeChromieWave = {
                    x: player.x,

                    maxRadius: Math.max(canvas.width, canvas.height),

                };
            }
            
            createCrownBurst() {

                for (let i = 0; i < 30; i++) {

                    ));

            draw() {
                const powerUp = powerUpTypes.find(p => p.type === this.type);
                
                ctx.save();
                
                // Pulsing effect
                const pulse = Math.sin(this.bounce * 2) * 0.3 + 0.7;
                ctx.globalAlpha = pulse;
                
                // Special handling for flame power-up - use animated walk cycle
                if (this.type === 'flame' && sprites.flameWalk && sprites.flameWalk.length > 0) {
                    const frameIndex = Math.floor(this.bounce * 0.5) % sprites.flameWalk.length;
                    const frameSprite = sprites.flameWalk[frameIndex];
                    if (frameSprite) {
                        ctx.drawImage(
                            frameSprite,
                            this.x - 20,
                            this.y - 20 + Math.sin(this.bounce) * 3,

                        );

                } else {
                    // Draw cropped sprite icon if available
                    const spriteIcon = sprites.powerUps[this.type];
                    if (spriteIcon) {
                        // Draw the cropped sprite with bounce animation
                        ctx.drawImage(
                            spriteIcon,
                            this.x - 20,
                            this.y - 20 + Math.sin(this.bounce) * 3,
                            40,
                            40
                        );
                    } else {
                        // Ultimate fallback - draw a colored circle
                        ctx.fillStyle = powerUp.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y + Math.sin(this.bounce) * 3, 16, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                ctx.restore();
            }
        }
        
        // Helper function for outlined text
        function drawOutlinedText(text, x, y, fillColor, outlineColor, font) {
            ctx.font = font || ctx.font;
            ctx.textAlign = 'center';
            ctx.strokeStyle = outlineColor || '#000000';
            ctx.lineWidth = 3;
            ctx.strokeText(text, x, y);
            ctx.fillStyle = fillColor;
            ctx.fillText(text, x, y);
        }
        
        // Initialize stars for background
        function initStars() {

                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,

                });

        // Continuous enemy spawning
        function spawnSingleEnemy() {
            // Don't spawn if we're at max capacity
            if (enemies.length >= maxEnemiesOnScreen) {
                return;
            }
            
            let x, y;
            const side = Math.floor(Math.random() * 4);
            
            switch (side) {
                case 0: // Top
                    x = Math.random() * canvas.width;
                    y = -50;
                    break;
                case 1: // Right
                    x = canvas.width + 50;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // Bottom
                    x = Math.random() * canvas.width;
                    y = canvas.height + 50;
                    break;
                case 3: // Left
                    x = -50;
                    y = Math.random() * canvas.height;
                    break;
            }
            
            enemies.push(new Enemy(x, y));
            
            // Spawn delay: 1-2 seconds
            nextSpawnDelay = 500 + Math.random() * 600;
            lastEnemySpawnTime = Date.now();
        }
        
        // Update game logic
        function update() {
            // Capture art on first frame of gameOver
            if (gameState === 'gameOver' && !capturedArt) {
                captureArt();
            }
            if (gameState !== 'playing' && gameState !== 'dying') return;
            if (gamePaused && gameState === 'playing') return;
            if (gameState === 'dying') {
                // Only update drift pixels during death sequence
                dyingDriftPixels = dyingDriftPixels.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    const d = p.decay || 0.98;
                    p.vx *= d;
                    p.vy *= d;
                    p.life--;
                    if (p.life > 0) {
                        // Main pixel in its committed color
                        const t = new FireTrail(p.x, p.y);
                        t.size = p.size;
                        t.color = p.color;
                        fireTrails.push(t);
                        // 30% chance: tiny speck of a DIFFERENT color nearby
                        if (Math.random() < 0.3) {
                            const st = new FireTrail(
                                p.x + (Math.random()-0.5) * 10,
                                p.y + (Math.random()-0.5) * 10
                            );
                            st.size = 0.5 + Math.random() * 0.8;
                            st.color = pixelColors[Math.floor(Math.random() * pixelColors.length)];
                            fireTrails.push(st);
                        }
                    }
                    return p.life > 0;
                });
                return;
            }
            

            
            // Update game time and progressive difficulty
            gameTime = (Date.now() - gameStartTime) / 1000;
            
            // Every 15 seconds: decrease spawn delay (min 400ms)
            if (Math.floor(gameTime / 15) > Math.floor((gameTime - 0.016) / 15)) {
                nextSpawnDelay = Math.max(400, nextSpawnDelay - 150);
            }
            
            // Every 20 seconds: increase enemy speed
            if (Math.floor(gameTime / 20) > Math.floor((gameTime - 0.016) / 20)) {
                enemySpeedMultiplier += 0.08;
                playerSpeedBonus += 0.03;
            }
            
            // Every 30 seconds: increase max enemies (cap at 30)
            if (Math.floor(gameTime / 30) > Math.floor((gameTime - 0.016) / 30)) {
                maxEnemiesOnScreen = Math.min(30, maxEnemiesOnScreen + 2);
            }
            

            
            // Wave-based spawning with breathing room
            const currentTime = Date.now();
            const waveLength = 30; // seconds per wave
            const pauseLength = 4; // seconds pause between waves
            const cycleTime = gameTime % (waveLength + pauseLength);
            const inPause = cycleTime >= waveLength;
            
            if (!inPause && currentTime - lastEnemySpawnTime >= nextSpawnDelay) {
                spawnSingleEnemy();
            }
            
            // Update player
            player.update();
            
            // Rainbow tracer — tight line trail behind player (not spray)
            if (rainbowActive) {
                rainbowTimer--;
                rainbowHue = (rainbowHue + 4) % 360;
                // Drop thick line trail directly behind player
                for (let i = 0; i < 3; i++) {
                    const t = new FireTrail(player.x, player.y);
                    t.x = player.x + (Math.random() - 0.5) * 8;
                    t.y = player.y + (Math.random() - 0.5) * 8;
                    t.size = 3 + Math.random() * 2.5; // Wider pixels
                    t.color = `hsl(${(rainbowHue + i * 20) % 360}, 100%, 55%)`;
                    fireTrails.push(t);
                }
                if (rainbowTimer <= 0) rainbowActive = false;
            }
            
            // Chrome drop spawning — every ~15 seconds
            const now = Date.now();
            if (now - lastChromeDrop > 15000 && !rainbowActive) {
                lastChromeDrop = now;
                chromeDrops.push({
                    x: 50 + Math.random() * (canvas.width - 100),
                    y: 50 + Math.random() * (canvas.height - 100),
                    size: 18,
                    hue: 0,
                    born: now
                });
            }
            
            // Update chrome drops — check pickup + animate
            for (let i = chromeDrops.length - 1; i >= 0; i--) {
                const drop = chromeDrops[i];
                drop.hue = (drop.hue + 3) % 360;
                // Despawn after 10 seconds
                if (now - drop.born > 10000) { chromeDrops.splice(i, 1); continue; }
                // Check player pickup
                const dx = player.x - drop.x, dy = player.y - drop.y;
                if (Math.sqrt(dx*dx + dy*dy) < player.size + drop.size) {
                    rainbowActive = true;
                    rainbowTimer = RAINBOW_DURATION;
                    rainbowHue = 0;
                    chromeDrops.splice(i, 1);
                }
            }
            
            // Update enemies
            enemies.forEach(enemy => enemy.update());
            
            // Update projectiles
            projectiles = projectiles.filter(proj => !proj.update());
            
            // Update particles
            particles = particles.filter(particle => {
                particle.update();
                return particle.life > 0;
            });
            
            // Trails are permanent art — no damage from them
            
            // Collision detection - player projectiles vs enemies
            projectiles.forEach((proj, pIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    const dx = proj.x - enemy.x;
                    const dy = proj.y - enemy.y;
                    if (dx * dx + dy * dy < (enemy.size * enemy.size)) {
                        // Pass projectile angle for knockback
                        const projAngle = Math.atan2(proj.vy, proj.vx);
                        if (enemy.takeDamage(proj.damage, projAngle)) {
                            // Enemy killed - tier-based scoring
                            let basePoints = 100; // Tier 1 default
                            if (enemy.tier === 2) basePoints = 200;
                            else if (enemy.tier === 3) basePoints = 300;
                            else if (enemy.tier === 4) basePoints = 500;
                            else if (enemy.tier === 5) basePoints = 1000;
                            
                            // Apply diamond doubling only
                            const points = basePoints * (playerBuffs.diamond > 0 ? 2 : 1);
                            score += points;
                            killCount++;
                            onEnemyKill();
                            
                            // Colorful pixel death explosion
                            if (enemy.isDarkBoss) spawnDarkSplat(enemy.x, enemy.y); else if (enemy.isBoss) spawnWhitePaintBomb(enemy.x, enemy.y); else spawnPixelDeath(enemy.x, enemy.y, enemy.favoriteColor);
                            
                            // Power-up drops disabled for now
                            
                            playSound('enemy-death');
                            playSound('kill-sound');
                            enemies.splice(eIndex, 1);
                        }
                        projectiles.splice(pIndex, 1);
                    }
                });
            });
            
            // Collision detection - enemies vs player
            enemies.forEach((enemy, index) => {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const distSq = dx * dx + dy * dy;
                const collisionDist = (enemy.size * 0.6 + player.size * 0.6) * (enemy.size * 0.6 + player.size * 0.6);
                
                if (distSq < collisionDist) {
                    // Skully power-up: death touch - enemy dies instantly when touched
                    if (playerBuffs.skully > 0) {
                        // Tier-based scoring for skully kills
                        let basePoints = 100; // Tier 1 default
                        if (enemy.tier === 2) basePoints = 200;
                        else if (enemy.tier === 3) basePoints = 300;
                        else if (enemy.tier === 4) basePoints = 500;
                        else if (enemy.tier === 5) basePoints = 1000;
                        
                        // Apply diamond doubling only
                        const points = basePoints * (playerBuffs.diamond > 0 ? 2 : 1);
                        score += points;
                        killCount++;
                        onEnemyKill();
                        
                        // Colorful pixel death explosion
                        if (enemy.isDarkBoss) spawnDarkSplat(enemy.x, enemy.y); else if (enemy.isBoss) spawnWhitePaintBomb(enemy.x, enemy.y); else spawnPixelDeath(enemy.x, enemy.y, enemy.favoriteColor);
                        
                        playSound('enemy-death');
                        playSound('kill-sound');
                        enemies.splice(index, 1);
                    } else {
                        // Normal collision - player takes damage
                        playSound('player-hit');
                        player.takeDamage();
                        streakCount = 0; // Reset kill streak on damage
                        // Push enemy away
                        const length = Math.sqrt(distSq);
                        if (length > 0) {
                            enemy.x -= (dx / length) * 30;
                            enemy.y -= (dy / length) * 30;
                        }
                    }
                }
            });
            
            // Check death — trigger the death sequence
            if (player.health <= 0 && gameState === 'playing') {
