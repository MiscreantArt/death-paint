            ctx.fillStyle = '#333333';
            ctx.fillText(`${killCount} kills`, cx, labelY + 24);
            ctx.font = '13px Georgia, serif';
            ctx.fillStyle = '#777777';
            ctx.fillText(`${canvasCoverage}% canvas covered`, cx, labelY + 42);

        function handleTouchStart(e) {
            e.preventDefault();
            initAudio();
            // iOS: ensure AudioContext is running on any user interaction
            if (audioCtx && audioCtx.state !== 'running') {
                audioCtx.resume().catch(err => console.warn('AudioContext resume failed:', err));
            }
            // Force music if it should be playing but isn't
            if (gameState === 'playing' && (!bgMusic || !bgMusic.source)) {
                if (audioCtx && audioCtx.state === 'running') {
                    if (!bgMusicBuffer) prepareMusic();
                    startMusic();
                }
            }
            if (gameState === 'gallery') {
                // In gallery view — check buttons
                if (e.touches.length > 0) {
                    const t = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    mouse.x = t.clientX - rect.left;
                    mouse.y = t.clientY - rect.top;
                    handleClick();
                }
                return;
            }
            if (gameState !== 'playing' && gameState !== 'tutorial') {
                // Handle menu/game over clicks
                if (e.touches.length > 0) {
                    const touch_event = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    mouse.x = touch_event.clientX - rect.left;
                    mouse.y = touch_event.clientY - rect.top;
                    handleClick();
                }
                return;
            }
            // Check toolbar buttons during gameplay
            if (e.touches.length > 0) {
                const t = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const tx = t.clientX - rect.left;
                const ty = t.clientY - rect.top;
                
                const inBtn = (btn) => btn && tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h;
                
                // Skip tutorial button
                if (gameState === 'tutorial' && skipButtonRect && inBtn(skipButtonRect)) {
                    playSound('menu-tap');
                    prepareMusic();
                    startGame();
                    return;
                }
                if (inBtn(hangBtnGameRect)) {
                    hangArtMidGame();
                    return;
                }
                if (inBtn(pauseBtnRect)) {
                    gamePaused = !gamePaused;
                    playSound('menu-tap');
                    return;
                }
                if (inBtn(endBtnRect)) {
                    // End game early — trigger death sequence
                    player.health = 0;
                    playSound('menu-tap');
                    return;
                }
                // If touch is in toolbar area (top), don't pass to game controls
                if (ty <= TOOLBAR_H) return;
            }
            
            // Show zone labels when first touching
            if (zoneLabelsVisible === 0) {
                zoneLabelsVisible = 180; // 3 seconds at 60fps
            }
            
            const rect = canvas.getBoundingClientRect();
            const centerX = canvas.width / 2;
            
            // Process each new touch
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;
                
                // Determine which zone this touch belongs to
                if (touchX < centerX) {
                    // Left zone (movement)
                    if (!leftZone.active) {
                        leftZone.active = true;
                        leftZone.touchId = touch.identifier;
                        leftZone.startX = touchX;
                        leftZone.startY = touchY;
                        leftZone.currentX = touchX;
                        leftZone.currentY = touchY;
                        leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                } else {
                    // Right zone (shooting) - block during tutorial step 1
                    if (!rightZone.active && !(gameState === 'tutorial' && tutorialStep === 1)) {
                        rightZone.active = true;
                        rightZone.touchId = touch.identifier;
                        rightZone.startX = touchX;
                        rightZone.startY = touchY;
                        rightZone.currentX = touchX;
                        rightZone.currentY = touchY;
                        rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                }
            }
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if (gameState !== 'playing' && gameState !== 'tutorial') return;
            
            const rect = canvas.getBoundingClientRect();
            
            // Process each moving touch
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;
                
                // Check if this touch belongs to left zone
                if (leftZone.active && leftZone.touchId === touch.identifier) {
                    leftZone.currentX = touchX;
                    leftZone.currentY = touchY;
                    
                    // Calculate direction vector from start to current position
                    const dx = leftZone.currentX - leftZone.startX;
                    const dy = leftZone.currentY - leftZone.startY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // Apply dead zone
                    if (distance > leftZone.deadZone) {
                        const angle = Math.atan2(dy, dx);
                        leftZone.currentDirection = {
                            x: dx / distance,
                            y: dy / distance,
                            angle: angle
                        };
                    } else {
                        leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                }
                
                // Check if this touch belongs to right zone
                if (rightZone.active && rightZone.touchId === touch.identifier) {
                    rightZone.currentX = touchX;
                    rightZone.currentY = touchY;
                    
                    // Calculate direction vector from start to current position
                    const dx = rightZone.currentX - rightZone.startX;
                    const dy = rightZone.currentY - rightZone.startY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // Apply dead zone
                    if (distance > rightZone.deadZone) {
                        const angle = Math.atan2(dy, dx);
                        rightZone.currentDirection = {
                            x: dx / distance,
                            y: dy / distance,
                            angle: angle
                        };
                    } else {
                        rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
                    }
                }
            }
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            if (gameState !== 'playing' && gameState !== 'tutorial') return;
            
            // Process each ended touch
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                // Check if this touch belongs to left zone (movement)
                if (leftZone.active && leftZone.touchId === touch.identifier) {
                    leftZone.active = false;
                    leftZone.touchId = null;
                    leftZone.currentDirection = { x: 0, y: 0, angle: 0 };
                }
                
                // Check if this touch belongs to right zone (shooting)
                if (rightZone.active && rightZone.touchId === touch.identifier) {
                    rightZone.active = false;
                    rightZone.touchId = null;
                    rightZone.currentDirection = { x: 0, y: 0, angle: 0 };
                }
            }
        }
        
        function handleClick() {
            try {
                initAudio(); // Init AudioContext on first user gesture (mobile requirement)
                if (gameState === 'menu') {
                    playSound('menu-tap');
                    prepareMusic(); // Unlock audio element during gesture for iOS
                    // Tutorial every time with skip option
                    startTutorial();
                } else if (gameState === 'gallery') {
                    const cx = mouse.x, cy = mouse.y;
                    // Save button in gallery
                    if (saveButtonRect) {
                        if (cx >= saveButtonRect.x && cx <= saveButtonRect.x + saveButtonRect.w &&
                            cy >= saveButtonRect.y && cy <= saveButtonRect.y + saveButtonRect.h) {
                            saveArtwork();
                            return;
                        }
                    }
                    // Back button — return to game
                    if (hangButtonRect) {
                        if (cx >= hangButtonRect.x && cx <= hangButtonRect.x + hangButtonRect.w &&
                            cy >= hangButtonRect.y && cy <= hangButtonRect.y + hangButtonRect.h) {
                            gameState = galleryReturnState || 'playing';
                            // Clear captured art if returning to gameplay so death recaptures fresh
                            if (gameState === 'playing') capturedArt = null;
                            playSound('menu-tap');
                            return;
                        }
                    }
                    return; // Gallery view — only buttons work
                } else if (gameState === 'gameOver') {
                    const cx = mouse.x, cy = mouse.y;
                    // Save button
                    if (saveButtonRect) {
                        if (cx >= saveButtonRect.x && cx <= saveButtonRect.x + saveButtonRect.w &&
                            cy >= saveButtonRect.y && cy <= saveButtonRect.y + saveButtonRect.h) {
                            saveArtwork();
                            return;
                        }

                    if (Date.now() - gameOverTime < 4000) return;

                } else if (gameState === 'victory') {
                    const cx = mouse.x, cy = mouse.y;
                    const elapsed = (Date.now() - victoryStartTime) / 1000;
                    if (elapsed < 6) return; // Wait for buttons to appear

                    // Hang Art button
                    if (window.victoryHangBtn) {
                        const btn = window.victoryHangBtn;
                        if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
                            playSound('menu-tap');
                            // Go to gallery mode
                            captureArt();
                            gameState = 'gallery';
                            galleryReturnState = 'gameOver';
                            return;
                        }
                    }

                    // Keep Painting button
                    if (window.victoryKeepBtn) {
                        const btn = window.victoryKeepBtn;
                        if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
                            playSound('menu-tap');
                            // Resume free-for-all mode
                            gameState = 'playing';
                            victoryDanceEnemies = [];
                            startMusic();
                            return;
                        }
                    }
                }
            } catch(e) {
                // Show error on canvas for mobile debugging
                ctx.fillStyle = 'red';
                ctx.font = '14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('ERROR: ' + e.message, 10, 50);
                console.error('handleClick error:', e);
            }
        }
        
        // Preroll — "paint the canvas" screen with grunt explosion
        let prerollStart = 0;
        let prerollGrunt = null;
        let prerollExploded = false;
        let prerollExplodeTime = 0;
        let prerollParticles = [];
        
        function startPreroll() {
            gameState = 'preroll';
            prerollStart = Date.now();
            // Play the chime
            playSound('player-death');
            prerollGrunt = null;
            prerollExploded = false;
            prerollExplodeTime = 0;
            enemies = [];
            particles = [];

            // Fresh paint canvas for the splat
            paintCanvas = document.createElement('canvas');

            coverageCanvas = document.createElement('canvas');

            coverageCanvas.height = canvas.height;

            canvasCoverage = 0;
            coverageCheckTimer = 0;
        }
        
        function updatePreroll() {
            frameDt = 1/60;
            const elapsed = (Date.now() - prerollStart) / 1000;
            
            // Spawn grunt at 0.6s
            if (!prerollGrunt && elapsed >= 0.6) {
                prerollGrunt = new Enemy(-30, canvas.height * 0.58, true);
                prerollGrunt.speed = 3.5;
                prerollGrunt.tutorialRunAcross = true;
            }
            
            // Move grunt
            if (prerollGrunt && !prerollExploded) {
                prerollGrunt.update();
                // Explode at center — use the real spawnPixelDeath
                if (prerollGrunt.x >= canvas.width * 0.5) {
                    spawnPixelDeath(prerollGrunt.x, prerollGrunt.y, prerollGrunt.favoriteColor);
                    playSound('enemy-death');
                    prerollExploded = true;
                    prerollExplodeTime = Date.now();
                    prerollGrunt = null;
                }
            }
            
            // Update real particles
            particles = particles.filter(particle => {
                particle.update();
                return particle.life > 0;
            });
            
            // Bake fire trails to paint canvas
            if (paintCtx && fireTrails.length > 0) {
                fireTrails.forEach(trail => {
                    paintCtx.fillStyle = trail.color;
                    paintCtx.fillRect(trail.x - trail.size, trail.y - trail.size, trail.size * 2, trail.size * 2);
                });
                fireTrails = [];
            }
            
            // Start game after explosion
            if (prerollExploded && Date.now() - prerollExplodeTime >= 1200) {
                startGame();
            }
        }

        function updateVictory() {
            frameDt = 1/60;
            const elapsed = (Date.now() - victoryStartTime) / 1000;

            // Auto-walk hero to center over 1 second
            if (elapsed < 1) {
                const targetX = canvas.width / 2;
                const targetY = canvas.height / 2;
                player.x += (targetX - player.x) * 0.1 * frameDt * 60;
                player.y += (targetY - player.y) * 0.1 * frameDt * 60;
            }

            // Spawn victory dance enemies after 1 second
            if (elapsed >= 1 && victoryDanceEnemies.length === 0) {
                const radius = 100;
                const enemyTypes = ['grunt', 'green', 'whiteBoss', 'darkBoss', 'goldMinion1', 'goldMinion2', 'robotMinion1', 'robotMinion2'];
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const x = player.x + Math.cos(angle) * radius;
                    const y = player.y + Math.sin(angle) * radius;
                    const type = enemyTypes[i % enemyTypes.length];
                    const e = new Enemy(x, y, false, type);
                    e.victoryDance = true;
                    e.orbitAngle = angle;
                    victoryDanceEnemies.push(e);
                }
            }

            // Victory dance: orbit around hero
            if (victoryDanceEnemies.length > 0 && elapsed >= 1 && elapsed < 9) {
                const orbitSpeed = victoryDanceReverse ? -0.02 : 0.02;
                victoryDanceEnemies.forEach(e => {
                    e.orbitAngle += orbitSpeed * frameDt * 60;
                    e.x = player.x + Math.cos(e.orbitAngle) * 100;
                    e.y = player.y + Math.sin(e.orbitAngle) * 100;
                    // Update animation
                    e.animTime += frameDt * 60;
                    if (Math.floor(e.animTime / 4) !== Math.floor((e.animTime - frameDt * 60) / 4)) {
                        e.animFrame = (e.animFrame + 1) % 6;
                    }
                    // Face direction of movement
                    if (Math.abs(Math.cos(e.orbitAngle)) > 0.5) {
                        e.currentDirection = Math.cos(e.orbitAngle) > 0 ? 'east' : 'west';
                    } else {
                        e.currentDirection = Math.sin(e.orbitAngle) > 0 ? 'south' : 'north';
                    }
                });

                // Reverse direction every 2 seconds
                if (Date.now() - victoryDanceLastReverse >= 2000) {
                    victoryDanceReverse = !victoryDanceReverse;
                    victoryDanceLastReverse = Date.now();
                }

                // All enemies jump together every 3 seconds
                if (Date.now() - victoryDanceLastJump >= 3000) {
                    victoryDanceLastJump = Date.now();
                    victoryDanceEnemies.forEach(e => {
                        for (let i = 0; i < 5; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            particles.push(new Particle(e.x, e.y, Math.cos(angle) * 2, Math.sin(angle) * 2 - 3, e.favoriteColor || '#ff4400', 8, 1));
                        }
                    });
                    playSound('enemy-death');
                }
            }

            // Fade out victory dance at 9 seconds
            if (elapsed >= 9) {
                victoryDanceEnemies = [];
            }

            // Update particles
            particles = particles.filter(particle => {
                particle.update();
                return particle.life > 0;
            });
        }

        function drawVictory() {
            // White background
            ctx.fillStyle = '#ffffff';

        // Main game loop
        let lastFrameTime = 0;
        function gameLoop(timestamp) {
            if (!lastFrameTime) lastFrameTime = timestamp;
            const rawDt = (timestamp - lastFrameTime) / 1000; // seconds
            const dt = Math.min(rawDt, 0.05); // cap at 50ms to prevent spiral
            lastFrameTime = timestamp;
            try {
                update(dt);
                draw();
            } catch(e) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'red';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('CRASH: ' + e.message, 10, 40);
                ctx.fillText('at: ' + (e.stack?.split('\n')[1]?.trim() || ''), 10, 65);
                ctx.fillText('wave: ' + currentWave + ' burst: ' + waveBurstIndex + '/' + burstSpawned + ' state: ' + gameState, 10, 90);
                console.error('Game loop crash:', e);
                gameState = 'crashed';
                return; // Stop the loop
            }
            requestAnimationFrame(gameLoop);
        }

        async function init() {
            // Show loading screen
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Loading sprites...', canvas.width / 2, canvas.height / 2);
            
            try { 
                await Promise.race([
                    loadSprites(),
                    new Promise(resolve => setTimeout(resolve, 15000)) // 15s timeout
                ]);
            } catch(e) { console.warn('Sprite load error (non-fatal):', e); }
            
            // Set initial mouse position
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2;
            
            requestAnimationFrame(gameLoop);
        }

        let _musicWasPlaying = false;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                _musicWasPlaying = !!(bgMusic && bgMusic.source);
                pauseMusic();
                // Don't suspend audioCtx — iOS will set it to 'interrupted' on its own
            } else {
                // Resume audioCtx from suspended/interrupted
                if (audioCtx && audioCtx.state !== 'running') {
                    audioCtx.resume().then(() => {
                        if (_musicWasPlaying && gameState === 'playing') resumeMusic();
                    });
                } else {
                    if (_musicWasPlaying && gameState === 'playing') resumeMusic();
                }
            }
        });
        
        // Listen for AudioContext state changes (iOS 'interrupted' state)
        function watchAudioState() {
            if (!audioCtx) return;
            audioCtx.onstatechange = () => {
                if (audioCtx.state === 'running' && _musicWasPlaying && gameState === 'playing') {
                    resumeMusic();
                    _musicWasPlaying = false;
                }
            };
        }
