<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Death Paint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100dvh;
            background: #ffffff;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            background: #ffffff;
            image-rendering: pixelated;
        }

    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
    
    <!-- Mobile controls: whole screen is now the control surface -->

    <script>
        // Game setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas sizing - full screen on mobile
        // Use visualViewport API to get actual visible area (excludes browser chrome)
        function getViewportSize() {
            if (window.visualViewport) {
                return { w: window.visualViewport.width, h: window.visualViewport.height };
            }
            return { w: window.innerWidth, h: window.innerHeight };
        }
        let isDesktop = false;
        function resizeCanvas() {
            const vp = getViewportSize();
            if (vp.w > 768) {
                isDesktop = true;
                canvas.width = 400;
                canvas.height = 711;
                return;
            }
            isDesktop = false;
            // 9:16 aspect ratio locked
            const targetRatio = 9 / 16;
            let h = vp.h;
            let w = h * targetRatio;
            if (w > vp.w) {
                w = vp.w;
                h = w / targetRatio;
            }
            canvas.width = Math.round(w);
            canvas.height = Math.round(h);
            canvas.style.width = canvas.width + 'px';
            canvas.style.height = canvas.height + 'px';
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', resizeCanvas);
        }

        // Game state
        let gameState = 'menu'; // menu, playing, dying, gameOver, gallery, tutorial, preroll
        let dyingStartTime = 0;
        let dyingEnemiesExploded = false;
        let dyingDriftPixels = []; // pixels that drift outward after death
        let score = 0;
        let killCount = 0;
        let streakCount = 0; // Grunt kills in current streak
        let streakPure = true; // True if only grunts killed (no other types hit first)
        let paintRainActive = false;
        let paintRainDrops = [];
        let paintRainTimer = 0;
        let gamePaused = false;
        
        // Halo power-up variables
        let haloCount = 0;  // Player's stored halos (extra lives), max 2
        let haloReviving = false;  // Currently in halo revive animation
        let haloReviveTime = 0;
        let haloHeroY = 0;  // Y position of descending halo hero
        let haloFlashTimer = 0;
        let haloReviveCueStage = 0;
        let haloTransformFlash = 0;
        let haloResumePauseUntil = 0;
        
        // Tutorial state
        let tutorialStep = 0;
        let tutorialMoveDist = 0;
        let tutorialEnemy = null;
        let tutorialStepStartTime = 0;
        let tutorialKills = 0;
        let tutorialStep3Grunt = null;
        let tutorialStep3Exploded = false;
        let tutorialStep3ExplodeTime = 0;
        
        // Kill streak → paint rain system
        function onEnemyKill(tier) {
            if (tier === 1) {
                // Grunt kill — counts toward streak
                streakCount++;
            } else {
                // Non-grunt killed — reset everything back to first note
                streakCount = 0;
                streakPure = true;
                soundDefs._killNote = 0;
            }
            // Paint rain: 10 grunts killed without killing any other type
            if (streakCount >= 10 && streakPure && !paintRainActive) {
                triggerPaintRain();
                streakCount = 0;
                streakPure = true;
                soundDefs._killNote = 0;
            }
        }
        
        function triggerPaintRain() {
            paintRainActive = true;
            paintRainTimer = 60; // Only spawn drops for 1 second, then let them fall and settle
            paintRainDrops = [];
            // Musical celebration — ascending major arpeggio
            const celebNotes = [523, 659, 784, 1047, 1319, 1568];
            celebNotes.forEach((note, i) => {
                setTimeout(() => {
                    synthTone(note, 0.3, 0.15, 'sine');
                    synthTone(note * 0.5, 0.2, 0.08, 'sine');
                }, i * 80);
            });
            // Final chord
            setTimeout(() => {
                synthChord([523, 659, 784, 1047], 0.8, 0.2, 'sine');
            }, celebNotes.length * 80);
            haptic([15, 10, 15, 10, 15, 10, 30]);
        }
        let screenShake = 0;
        let hitPause = 0; // Freeze frames on kill for impact

        
        // Game progression features
        let gameTime = 0; // Game time in seconds for progressive difficulty
        let gameStartTime = 0; // Track when game started
        
        // Rainbow tracer system
        let rainbowActive = false; // Player has rainbow tracer
        let rainbowTimer = 0; // Frames remaining
        let rainbowHue = 0; // Cycling hue
        const RAINBOW_DURATION = 600; // ~10 seconds at 60fps
        let enemySpeedMultiplier = 1; // Progressive difficulty
        let playerSpeedBonus = 0; // Progressive player speed
        
        // Input handling
        const keys = {};
        const mouse = { x: 0, y: 0, down: false, lastMoveTime: 0 };
        
        // Split-screen dual-zone touch control system
        const leftZone = {
            active: false,
            touchId: null,
            startX: 0,
            startY: 0,
            currentX: 0,
            currentY: 0,
            currentDirection: { x: 0, y: 0, angle: 0 },
            deadZone: 8
        };
        
        const rightZone = {
            active: false,
            touchId: null,
            startX: 0,
            startY: 0,
            currentX: 0,
            currentY: 0,
            currentDirection: { x: 0, y: 0, angle: 0 },
            deadZone: 8
        };
        
        // UI labels fade timer
        let zoneLabelsVisible = 0;
        
        // Auto-fire system
        let lastAutoFireTime = 0;
        const autoFireRate = 200; // milliseconds
        
        // Continuous enemy spawning system
        let lastEnemySpawnTime = 0;

        let maxEnemiesOnScreen = 12; // Starts chill, grows over time
        

        
        // Game objects arrays
        let player;
        let enemies = [];
        let projectiles = [];

        let powerUps = [];
        let particles = [];

        let fireTrails = [];
        // Offscreen bitmap — trails get baked here each frame to prevent array bloat
        let paintCanvas = null;
        let paintCtx = null;
        let stars = [];
        
        // Delta time for frame-rate independence
        let frameDt = 0;
        
        // ===== SOUND SYSTEM (Synthesized — musical & pleasing) =====
        let audioCtx = null;
        let bgMusic = null; // { buffer, source, gain, startTime, offset }
        let bgMusicBuffer = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                watchAudioState();
            }
            // iOS/Safari: AudioContext can be suspended OR interrupted (iOS background)
            if (audioCtx.state !== 'running') {
                audioCtx.resume();
            }
            // Warm up: play silent buffer to keep context alive (iOS trick)
            try {
                const silentBuf = audioCtx.createBuffer(1, 1, 22050);
                const silentSrc = audioCtx.createBufferSource();
                silentSrc.buffer = silentBuf;
                silentSrc.connect(audioCtx.destination);
                silentSrc.start(0);
            } catch(e) {}
            // Preload WAV files as AudioBuffers — works reliably on all platforms
            function preloadBuffer(url, key) {
                if (soundDefs[key] || soundDefs[key + '_loading']) return;
                soundDefs[key + '_loading'] = true;
                fetch(url)
                    .then(r => r.arrayBuffer())
                    .then(buf => audioCtx.decodeAudioData(buf))
                    .then(decoded => { soundDefs[key] = decoded; })
                    .catch(() => { soundDefs[key + '_loading'] = false; });
            }
            preloadBuffer('sounds/death-chime.wav', '_chimeBuffer');
            preloadBuffer('sounds/duck-quack.wav?v=3', '_quackBuffer');
            // Start loading music buffer on first audio init
            prepareMusic();
        }

        let _musicLoadFailed = false;
        function prepareMusic() {
            // Preload music as AudioBuffer — no HTML Audio element needed
            if (!bgMusicBuffer && !bgMusic?._loading && audioCtx) {
                const m = { _loading: true };
                bgMusic = m;
                _musicLoadFailed = false;
                fetch('sounds/starshore-save-point.mp3')
                    .then(r => {
                        if (!r.ok) throw new Error('Music fetch failed: ' + r.status);
                        return r.arrayBuffer();
                    })
                    .then(buf => audioCtx.decodeAudioData(buf))
                    .then(decoded => { bgMusicBuffer = decoded; bgMusic = null; })
                    .catch(err => { bgMusic = null; _musicLoadFailed = true; console.warn('Music load error:', err); });
            }
        }
        let _musicRetryInterval = null;
        function startMusic() {
            stopMusic();
            if (_musicRetryInterval) { clearInterval(_musicRetryInterval); _musicRetryInterval = null; }
            if (!audioCtx) return;
            // Re-resume AudioContext in case iOS suspended it during tutorial
            if (audioCtx.state !== 'running') audioCtx.resume();
            if (!bgMusicBuffer) {
                // Retry loading if it failed
                if (_musicLoadFailed) prepareMusic();
                // Buffer still loading — retry every 500ms until it's ready
                _musicRetryInterval = setInterval(() => {
                    if (_musicLoadFailed) prepareMusic();
                    if (bgMusicBuffer && gameState === 'playing') {
                        clearInterval(_musicRetryInterval);
                        _musicRetryInterval = null;
                        startMusic();
                    }
                }, 500);
                return;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = bgMusicBuffer;
            source.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.25;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start(0);
            bgMusic = { source, gain, startTime: audioCtx.currentTime, offset: 0 };
        }
        function stopMusic() {
            if (bgMusic && bgMusic.source) {
                try { bgMusic.source.stop(); } catch(e) {}
                bgMusic = null;
            }
        }
        function pauseMusic() {
            if (bgMusic && bgMusic.source && audioCtx) {
                bgMusic.offset = (audioCtx.currentTime - bgMusic.startTime) % (bgMusicBuffer?.duration || 1);
                try { bgMusic.source.stop(); } catch(e) {}
                bgMusic.source = null;
            }
        }
        function resumeMusic() {
            if (!bgMusicBuffer || !audioCtx || !bgMusic) return;
            const source = audioCtx.createBufferSource();
            source.buffer = bgMusicBuffer;
            source.loop = true;
            const gain = bgMusic.gain || audioCtx.createGain();
            if (!bgMusic.gain) { gain.gain.value = 0.15; gain.connect(audioCtx.destination); }
            source.connect(gain);
            source.start(0, bgMusic.offset || 0);
            bgMusic.source = source;
            bgMusic.startTime = audioCtx.currentTime - (bgMusic.offset || 0);
        }

        // === Haptics ===
        function haptic(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        // === Synth helpers ===
        function synthTone(freq, dur, vol, type, ramp) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type || 'sine';
            o.frequency.setValueAtTime(freq, t);
            if (ramp) o.frequency.exponentialRampToValueAtTime(ramp, t + dur);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t); o.stop(t + dur);
        }
        // Schedule a tone in the future using AudioContext timing (works on iOS)
        function synthToneAt(delayMs, freq, dur, vol, type) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime + delayMs / 1000;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type || 'sine';
            o.frequency.setValueAtTime(freq, t);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t); o.stop(t + dur);
        }

        function synthNoise(dur, vol, filterFreq) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const bufSize = audioCtx.sampleRate * dur;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.setValueAtTime(filterFreq || 3000, t);
            filt.frequency.exponentialRampToValueAtTime(200, t + dur);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
            src.start(t); src.stop(t + dur);
        }

        function synthChord(freqs, dur, vol, type) {
            freqs.forEach(f => synthTone(f, dur, vol / freqs.length, type || 'sine'));
        }

        // === Sound throttling ===
        const soundThrottles = {};
        const throttleMs = { 'laser-shoot': 120, 'enemy-hit': 60, 'kill-sound': 60, 'enemy-death': 40 };

        // === Sound definitions (all synthesized) ===
        const soundDefs = {
            'laser-shoot': () => {
                // Soft pluck — like a muted guitar string or marimba tap
                // Low, warm, percussive — NOT a zap or laser
                const notes = [392, 440, 494, 523, 587]; // G4-D5 range, warm
                const note = notes[Math.floor(Math.random() * notes.length)];
                const t = audioCtx.currentTime;
                // Attack: instant, decay: fast but smooth
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(note, t);
                o.frequency.setValueAtTime(note * 0.98, t + 0.06); // slight pitch drop = pluck feel
                g.gain.setValueAtTime(0.09, t);
                g.gain.setValueAtTime(0.07, t + 0.01); // fast initial decay
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(t); o.stop(t + 0.12);
                // Quiet body tone underneath
                synthTone(note * 0.5, 0.08, 0.03, 'sine');
                haptic(4);
            },
            'enemy-hit': () => {
                // Soft thud — satisfying impact
                synthTone(180, 0.1, 0.12, 'sine', 60);
                synthNoise(0.05, 0.06, 1200);
                haptic(12);
            },
            'firework-pop': () => {
                // Firework death — ascending whistle + sparkle burst
                if (!soundDefs._fwNote) soundDefs._fwNote = 0;
                const n = soundDefs._fwNote;
                soundDefs._fwNote++;
                
                // Rising base note — starts low, climbs with each pop
                const baseFreq = 330 + n * 60;
                
                // Whistle rise (quick ascending sweep)
                if (audioCtx) {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(baseFreq * 0.5, t);
                    osc.frequency.exponentialRampToValueAtTime(baseFreq * 2, t + 0.12);
                    gain.gain.setValueAtTime(0.15, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.2);
                    
                    // Sparkle burst — high shimmer
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(baseFreq * 3, t + 0.05);
                    osc2.frequency.exponentialRampToValueAtTime(baseFreq * 4, t + 0.15);
                    gain2.gain.setValueAtTime(0.08, t + 0.05);
                    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start(t + 0.05);
                    osc2.stop(t + 0.25);
                }
                
                // Soft pop
                synthNoise(0.06, 0.08, 3000 + n * 200);
                haptic(20);
            },
            'enemy-death': () => {
                // Musical paint pop — each kill plays next note in pentatonic scale
                // Creates an ascending melody as you kill enemies
                const scale = [262, 294, 330, 392, 440, 523, 587, 659, 784, 880, 1047];
                if (!soundDefs._killNote) soundDefs._killNote = 0;
                const note = scale[soundDefs._killNote % scale.length];
                soundDefs._killNote++;
                synthTone(note, 0.15, 0.22, 'sine');
                synthTone(note * 2, 0.1, 0.1, 'sine'); // octave shimmer
                synthNoise(0.04, 0.1, 2000); // soft pop
                haptic(15);
            },
            'kill-sound': () => {
                // Complementary chime — fifth above the last kill note
                const scale = [262, 294, 330, 392, 440, 523, 587, 659, 784, 880, 1047];
                const note = scale[(soundDefs._killNote || 0) % scale.length];
                synthTone(note * 1.5, 0.08, 0.08, 'sine');
            },
            'player-hit': () => {
                // Low warning thump
                synthTone(110, 0.15, 0.2, 'sine', 55);
                synthNoise(0.08, 0.1, 600);
                haptic([30, 20, 30]);
            },
            'player-death': () => {
                // Death jingle — preloaded AudioBuffer, plays immediately
                if (soundDefs._chimeBuffer && audioCtx) {
                    try {
                        const source = audioCtx.createBufferSource();
                        source.buffer = soundDefs._chimeBuffer;
                        const gain = audioCtx.createGain();
                        gain.gain.value = 0.85;
                        source.connect(gain);
                        gain.connect(audioCtx.destination);
                        source.start(0);
                    } catch(e) {}
                }
                haptic([50, 30, 70, 40, 100]);
            },
            'game-over': () => {
                // The painting settles — gentle resolution
                // Shift from Cmaj7 to a softer Bbmaj7 (like a sigh)
                setTimeout(() => {
                    synthTone(233, 2.5, 0.18, 'sine');   // Bb3
                    synthTone(294, 2.3, 0.15, 'sine');   // D4
                    synthTone(349, 2.0, 0.13, 'sine');   // F4
                    synthTone(440, 1.8, 0.11, 'sine');   // A4 — maj7
                }, 0);
                // Final single note — everything resolves to one frequency
                setTimeout(() => {
                    synthTone(262, 3.0, 0.14, 'sine');   // C4 — home
                }, 1200);
                haptic([30, 40, 30, 50, 60]);
            },
            'powerup-collect': () => {
                // Bright ascending arpeggio
                synthTone(523, 0.08, 0.1, 'sine');
                setTimeout(() => synthTone(659, 0.08, 0.1, 'sine'), 50);
                setTimeout(() => synthTone(784, 0.08, 0.1, 'sine'), 100);
                setTimeout(() => synthTone(1047, 0.15, 0.12, 'sine'), 150);
                haptic([15, 10, 15, 10, 20]);
            },
            'chromie-shimmer': () => {
                // Glass bell — stacked major chord harmonics with gentle detune
                const base = 900 + Math.random() * 400;
                const detune = 1 + (Math.random() - 0.5) * 0.01; // subtle wobble
                synthTone(base, 0.25, 0.035, 'sine');                    // root
                synthTone(base * 1.25 * detune, 0.22, 0.025, 'sine');   // major third
                synthTone(base * 1.5, 0.2, 0.02, 'sine');               // perfect fifth
                synthTone(base * 2 * detune, 0.18, 0.015, 'sine');      // octave
                synthTone(base * 3, 0.12, 0.008, 'sine');               // high overtone — sparkle
            },
            'chromie-shockwave': () => {
                // Big swoosh with rising shimmer
                synthNoise(0.4, 0.15, 4000);
                synthTone(220, 0.5, 0.1, 'sine', 880);
                synthTone(330, 0.5, 0.08, 'triangle', 1320);
                haptic([20, 10, 20, 10, 40]);
            },
            'enemy-shoot': () => {
                // Soft laser pew — mid-pitched with slight descending swoosh
                synthTone(480, 0.12, 0.08, 'sine', 320);
                synthNoise(0.04, 0.05, 2000);
            },

            'duck-quack': () => {
                if (soundDefs._quackBuffer && audioCtx) {
                    try {
                        const source = audioCtx.createBufferSource();
                        source.buffer = soundDefs._quackBuffer;
                        const gain = audioCtx.createGain();
                        gain.gain.value = 0.5;
                        source.connect(gain);
                        gain.connect(audioCtx.destination);
                        source.start(0);
                    } catch(e) {}
                }
                haptic(15);
            },


            'skully-activate': () => {
                // Creepy dissonant ping — minor second + descending undertone
                synthTone(330, 0.4, 0.1, 'sine');           // eerie high ping
                synthTone(311, 0.45, 0.08, 'sine');          // minor second — dissonance
                synthTone(110, 0.5, 0.12, 'sawtooth', 55);  // slow descending growl
                synthTone(165, 0.3, 0.06, 'square', 82);    // gritty undertone
                synthNoise(0.15, 0.04, 800);                 // breath of static
                haptic([30, 15, 30]);
            },

            'menu-tap': () => {
                // Clean click
                synthTone(800, 0.04, 0.1, 'sine');
                haptic(5);
            },
            'game-start': () => {
                // Energetic start — ascending major
                synthTone(523, 0.1, 0.1, 'sine');
                setTimeout(() => synthTone(659, 0.1, 0.1, 'sine'), 80);
                setTimeout(() => synthTone(784, 0.1, 0.1, 'sine'), 160);
                setTimeout(() => synthChord([1047, 1319, 1568], 0.3, 0.15, 'sine'), 240);
                haptic([10, 10, 10, 10, 25]);
            },

            'powerup-spawn': () => {
                // Gentle sparkle
                synthTone(1047, 0.1, 0.05, 'sine', 523);
                haptic(5);
            },
            'powerup-expire': () => {
                // Soft descend
                synthTone(660, 0.15, 0.06, 'sine', 330);
            },
            'enemy-whoosh': () => {
                synthNoise(0.12, 0.06, 2500);
            },
            'splat-current': () => {
                // Paint splat — wet pop
                synthNoise(0.1, 0.1, 1800);
                synthTone(150, 0.08, 0.08, 'sine', 60);
                haptic(10);
            },
            'red-king-enter': () => {
                // Ominous deep rumble — the Red King arrives
                synthTone(55, 1.5, 0.2, 'sawtooth', 30);
                synthTone(80, 1.2, 0.15, 'sine');
                synthNoise(0.8, 0.06, 200);
                haptic([50, 30, 50, 30, 80]);
            },
            'red-king-death': () => {
                // Triumphant rising chord — the King falls
                synthTone(220, 0.8, 0.15, 'sine');
                scheduleTone(330, 0.7, 0.12, 'sine', 150);
                scheduleTone(440, 0.6, 0.12, 'sine', 300);
                scheduleTone(550, 0.5, 0.1, 'sine', 450);
                scheduleTone(660, 0.8, 0.15, 'sine', 600);
                haptic([40, 20, 40, 20, 60, 30, 80]);
            },
            'halo-revive': () => {
                // Beautiful fantasy melody — longer notes so you can actually hear it
                synthChord([196, 294, 392], 1.8, 0.05, 'triangle');
                synthTone(392, 0.42, 0.13, 'sine');
                scheduleTone(523, 0.42, 0.13, 'sine', 260);
                scheduleTone(587, 0.5, 0.12, 'sine', 560);
                scheduleTone(784, 0.9, 0.11, 'sine', 940);
                haptic([20, 20, 35, 20, 50]);
            },
            'halo-land': () => {
                // Gentle resolve when he settles in the center

                // Pixel squares, not circles

        // Player class
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 38;
                this.speed = 2.5;
                this.health = 3;
                this.animFrame = 0;
                this.animTime = 0;
                this.isMoving = false;
                this.lastShot = 0;
                this.shootDelay = 200;
                this.currentDirection = 'east'; // Track current facing direction
                this.lastAimDirection = 'east'; // Track last aim direction
            }
            
            update() {
                this.isMoving = false;
                let dx = 0, dy = 0;
                
                // Left zone controls movement
                if (leftZone.active && (leftZone.currentDirection.x !== 0 || leftZone.currentDirection.y !== 0)) {
                    // Touch movement - live steering while left finger is down
                    dx = leftZone.currentDirection.x;
                    dy = leftZone.currentDirection.y;
                } else if (!leftZone.active && !rightZone.active) {
                    // Desktop controls - only when not using any touch zones
                    if (keys['w'] || keys['ArrowUp']) dy -= 1;
                    if (keys['s'] || keys['ArrowDown']) dy += 1;
                    if (keys['a'] || keys['ArrowLeft']) dx -= 1;
                    if (keys['d'] || keys['ArrowRight']) dx += 1;
                }
                
                // Apply movement ONLY if there's input
                if (dx !== 0 || dy !== 0) {
                    this.isMoving = true;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    if (length > 0) {
                        dx /= length;
                        dy /= length;
                    }
                    
                    const speed = this.speed + playerSpeedBonus;
                    this.x += dx * speed * frameDt * 60;
                    this.y += dy * speed * frameDt * 60;
                    
                    // Keep player in bounds
                    this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                    this.y = Math.max(TOOLBAR_H + this.size, Math.min(canvas.height - this.size, this.y));
                }
                
                // Determine facing direction with correct priority:
                // 1. RIGHT thumb (aim zone) active → face aim direction (highest priority)
                // 2. ONLY LEFT thumb (move zone) active → face movement direction (medium priority)  
                // 3. Neither active → keep last facing direction (lowest priority)
                // Desktop: mouse overrides when actively aiming, movement keys when mouse inactive
                
                const now = Date.now();
                const mouseRecentlyMoved = (now - mouse.lastMoveTime) < 2000; // 2 second threshold
                
                let newDirection = null;
                
                // Priority 1: RIGHT thumb (aim zone) active - highest priority
                if (rightZone.active && (rightZone.currentDirection.x !== 0 || rightZone.currentDirection.y !== 0)) {
                    newDirection = this.getCardinalDirection(rightZone.currentDirection.x, rightZone.currentDirection.y);
                }
                // Priority 1b: Desktop mouse aiming (when mouse recently moved or actively clicking)
                else if (!leftZone.active && !rightZone.active && mouse.x !== undefined && (mouseRecentlyMoved || mouse.down)) {
                    const aimDx = mouse.x - this.x;
                    const aimDy = mouse.y - this.y;
                    if (aimDx !== 0 || aimDy !== 0) {
                        newDirection = this.getCardinalDirection(aimDx, aimDy);
                    }
                }
                // Priority 2: ONLY LEFT thumb (move zone) active - medium priority
                else if (leftZone.active && !rightZone.active && (leftZone.currentDirection.x !== 0 || leftZone.currentDirection.y !== 0)) {
                    newDirection = this.getCardinalDirection(leftZone.currentDirection.x, leftZone.currentDirection.y);
                }
                // Priority 2b: Desktop movement keys (when mouse hasn't moved recently)
                else if (!leftZone.active && !rightZone.active && !mouseRecentlyMoved && (dx !== 0 || dy !== 0)) {
                    newDirection = this.getCardinalDirection(dx, dy);
                }
                
                // Update facing direction or keep last direction (Priority 3)
                if (newDirection !== null) {
                    this.currentDirection = newDirection;
                    this.lastAimDirection = newDirection; // Update last known direction
                } else {
                    // Priority 3: Keep last facing direction
                    this.currentDirection = this.lastAimDirection || 'east';
                }
                
                // Animation
                this.animTime += frameDt * 60;
                if (Math.floor(this.animTime / 8) !== Math.floor((this.animTime - frameDt * 60) / 8)) {
                    this.animFrame = (this.animFrame + 1) % 6;
                }
                
                // Shooting logic
                const shootNow = Date.now();
                
                // Right zone auto-fire: while right thumb is down and dragged past dead zone
                const shouldAutoFire = rightZone.active && (rightZone.currentDirection.x !== 0 || rightZone.currentDirection.y !== 0);
                
                // Manual shooting (desktop) - only when not using touch zones
                const manualShoot = !leftZone.active && !rightZone.active && (mouse.down || keys[' ']);
                
                if (shouldAutoFire && shootNow - lastAutoFireTime > autoFireRate) {
                    this.shoot(rightZone.currentDirection.angle);
                    lastAutoFireTime = shootNow;
                } else if (manualShoot && shootNow - this.lastShot > this.shootDelay) {
                    this.shoot();
                    this.lastShot = shootNow;
                }
            }
            
            // Helper method to determine cardinal direction from a vector
            // Any diagonal aim should bias east/west so the bird reads clearly
            getCardinalDirection(dx, dy) {
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                
                if (absDx > 0.01 && absDy > 0.01) {
                    return dx > 0 ? 'east' : 'west';
                }
                if (absDx > 0.01) {
                    return dx > 0 ? 'east' : 'west';
                }
                return dy < 0 ? 'north' : 'south';
            }
            
            shoot(forceAngle = null) {
                // Use forced angle (mobile auto-fire) or mouse position (desktop)
                const angle = forceAngle !== null ? forceAngle : Math.atan2(mouse.y - this.y, mouse.x - this.x);
                
                // Always face the actual shot direction — this is the final truth
                const shotDir = this.getCardinalDirection(Math.cos(angle), Math.sin(angle));
                this.currentDirection = shotDir;
                this.lastAimDirection = shotDir;

                const damage = 1;
                
                // Laser spawns from the bird's eyes — fixed position based on facing
                // Eyes are ~30% from top of sprite (y - size*0.3 above center)
                const aimDirX = Math.cos(angle);

                // Eye position: fixed Y at eye level, slight X offset toward facing
                let eyeOffX = 0;
                if (this.currentDirection === 'east') eyeOffX = this.size * 0.15;
                else if (this.currentDirection === 'west') eyeOffX = -this.size * 0.15;
                const eyeX = this.x + eyeOffX;
                const eyeY = this.y - this.size * 0.3;
                
                if (playerBuffs.duck > 0) {
                    // DUCK MODE — shoot duck crops with quack

                    const duckProj = new LaserBeam(eyeX, eyeY + this.size * 0.3, angle, 10, damage, '#ffdd00', 0);

                    projectiles.push(new LaserBeam(eyeX - perpX, eyeY - perpY, angle, 14, damage, '#ff2200', 0));

                    this.frozenTimer -= frameDt * 60;
                    // Walk animation continues (walking in place) facing the hero
                    this.animTimer += frameDt * 60;
                    if (this.animTimer >= 8) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 6; }
                    // Face the player while frozen
                    const fdx = player.x - this.x;
                    const fdy = player.y - this.y;
                    if (Math.abs(fdx) > Math.abs(fdy)) {
                        this.currentDirection = fdx > 0 ? 'east' : 'west';
                    } else {
                        this.currentDirection = fdy > 0 ? 'south' : 'north';
                    }
                    // Kill any residual knockback
                    this.knockbackX = 0;
                    this.knockbackY = 0;
                    // When crown freeze ends, remove bomber vulnerability
                    if (this.frozenTimer <= 0 && this.crownVulnerable) {
                        this.crownVulnerable = false;
                    }
                    return; // Skip movement — completely stuck
                }
                
                // Spawn flash — blink on/off when emerging from boss
                if (this.spawnFlash > 0) {
                    this.spawnFlash -= frameDt * 60;
                }
                
                // Gold King: shake and spawn minion pairs every ~4 seconds
                if (this.isGoldCrown && this.minionSpawnTimer !== undefined) {
                    this.minionSpawnTimer -= frameDt * 60;
                    // Start shaking 20 frames before spawn
                    if (this.minionSpawnTimer <= 20 && this.minionSpawnTimer > 0) {
                        this.shakeTimer = this.minionSpawnTimer;
                    }
                    if (this.minionSpawnTimer <= 0) {
                        this.shakeTimer = 0;
                        this.minionSpawnTimer = 240; // Reset 4s timer
                        // Spawn a pair of gold minions from the king
                        if (enemies.length < 20) {
                            const m1 = new Enemy(this.x - 30, this.y, false, 'goldMinion1');
                            m1.spawnFlash = 30; // Flash on/off for 0.5s
                            const m2 = new Enemy(this.x + 30, this.y, false, 'goldMinion2');
                            m2.spawnFlash = 30;
                            enemies.push(m1, m2);
                            // Gold spray particles
                            const goldSpray = ['#ffd700', '#ffaa00', '#ffcc33', '#fff200'];
                            for (let i = 0; i < 20; i++) {
                                const a = Math.random() * Math.PI * 2;
                                particles.push(new Particle(this.x + Math.cos(a) * 15, this.y + Math.sin(a) * 15, Math.cos(a) * (2 + Math.random() * 3), Math.sin(a) * (2 + Math.random() * 3), goldSpray[Math.floor(Math.random() * goldSpray.length)], 8 + Math.floor(Math.random() * 10), 1 + Math.random()));
                            }
                            playSound('chromie-shockwave');
                        }
                    }
                }
                
                // Gold minion splitting — every 3 seconds, split into 2 of the other type
                if ((this.isGoldMinion1 || this.isGoldMinion2) && this.splitTimer !== undefined) {
                    this.splitTimer -= frameDt * 60;
                    // Warning shake + gold spray at 1 second remaining
                    if (this.splitTimer <= 60 && !this.splitWarning) {
                        this.splitWarning = true;
                    }
                    // Emit light gold spray during warning
                    if (this.splitWarning && Math.random() < 0.15) {
                        const a = Math.random() * Math.PI * 2;
                        particles.push(new Particle(this.x, this.y, Math.cos(a) * 1.5, Math.sin(a) * 1.5, '#ffd700', 4 + Math.floor(Math.random() * 5), 0.6 + Math.random() * 0.4));
                    }
                    if (this.splitTimer <= 0) {
                        // Cap: don't split if too many enemies on screen
                        if (enemies.length < 20) {
                            const childType = this.isGoldMinion1 ? 'goldMinion2' : 'goldMinion1';
                            const c1 = new Enemy(this.x - 15, this.y - 10, false, childType);
                            const c2 = new Enemy(this.x + 15, this.y + 10, false, childType);
                            enemies.push(c1, c2);
                            // Gold spray on split
                            const goldSpray = ['#ffd700', '#ffaa00', '#ffcc33'];
                            for (let i = 0; i < 12; i++) {
                                const a = Math.random() * Math.PI * 2;
                                particles.push(new Particle(this.x, this.y, Math.cos(a) * (1.5 + Math.random() * 2), Math.sin(a) * (1.5 + Math.random() * 2), goldSpray[Math.floor(Math.random() * goldSpray.length)], 6 + Math.floor(Math.random() * 8), 0.8 + Math.random() * 0.6));
                            }
                            // Mark self for removal
                            this.health = 0;
                            this._markedDead = true;
                            return;
                        } else {
                            // Can't split — reset timer and try again later
                            this.splitTimer = 180;
                            this.splitWarning = false;
                        }
                    }
                }

                // Robot Girl boss: stays at top, moves left/right, spawns minions, fires laser
                if (this.isRobotGirl) {
                    // Stay at top of screen (y = 100-120)
                    const targetY = 110;
                    if (Math.abs(this.y - targetY) > 2) {
                        this.y += (targetY - this.y) * 0.1 * frameDt * 60;
                    }
                    // Slow horizontal movement
                    this.x += this.speed * Math.sin(Date.now() / 1000) * frameDt * 60;
                    // Clamp to screen bounds
                    if (this.x < 80) this.x = 80;
                    if (this.x > canvas.width - 80) this.x = canvas.width - 80;

                    // Spawn minions every 6 seconds
                    this.minionSpawnTimer -= frameDt * 60;
                    if (this.minionSpawnTimer <= 20 && this.minionSpawnTimer > 0) {
                        this.shakeTimer = this.minionSpawnTimer;
                    }
                    if (this.minionSpawnTimer <= 0) {
                        this.shakeTimer = 0;
                        this.minionSpawnTimer = 360; // Reset 6s timer
                        if (enemies.length < 20) {
                            const m1 = new Enemy(this.x - 40, this.y, false, 'robotMinion1');
                            m1.spawnFlash = 30;
                            const m2 = new Enemy(this.x + 40, this.y, false, 'robotMinion2');
                            m2.spawnFlash = 30;
                            enemies.push(m1, m2);
                            // Silver/purple spray particles
                            const colors = ['#c0c0c0', '#d4d4d4', '#9933ff'];
                            for (let i = 0; i < 20; i++) {
                                const a = Math.random() * Math.PI * 2;
                                particles.push(new Particle(this.x + Math.cos(a) * 15, this.y + Math.sin(a) * 15, Math.cos(a) * (2 + Math.random() * 3), Math.sin(a) * (2 + Math.random() * 3), colors[Math.floor(Math.random() * colors.length)], 8 + Math.floor(Math.random() * 10), 1 + Math.random()));
                            }
                            playSound('chromie-shockwave');
                        }
                    }

                    // Laser attack cycle: charge 1s, then fire 2s laser
                    if (this.laserActiveTimer > 0) {
                        // Laser is firing
                        this.laserActiveTimer -= frameDt * 60;
                        // Sweep laser slowly left or right
                        this.laserX += this.laserSweepDir * 1.2 * frameDt * 60;
                        // Reverse direction at edges
                        if (this.laserX < 20 || this.laserX > canvas.width - 20) {
                            this.laserSweepDir *= -1;
                        }
                        // Leave purple paint on canvas
                        if (Math.random() < 0.4) {
                            const t = new FireTrail(this.laserX + (Math.random() - 0.5) * 30, this.y + 50 + Math.random() * (canvas.height - this.y - 50));
                            t.size = 2 + Math.random() * 3;
                            t.color = Math.random() < 0.5 ? '#9933ff' : '#cc66ff';
                            fireTrails.push(t);
                        }
                        // Damage player if they touch laser
                        const laserWidth = 35;
                        if (Math.abs(player.x - this.laserX) < laserWidth && player.y > this.y + 30) {
                            if (Math.random() < 0.15) { // Damage per frame
                                player.takeDamage(1);
                            }
                        }
                        if (this.laserActiveTimer <= 0) {
                            this.laserChargeTimer = 300; // 5 seconds until next laser
                        }
                    } else if (this.laserChargeTimer > 0) {
                        // Charging next laser
                        this.laserChargeTimer -= frameDt * 60;
                        if (this.laserChargeTimer <= 60 && this.laserChargeTimer > 0) {
                            // Warning shake and glow
                            this.shakeTimer = Math.max(this.shakeTimer, this.laserChargeTimer / 60 * 3);
                            if (Math.random() < 0.2) {
                                particles.push(new Particle(this.x, this.y, 0, 2 + Math.random() * 3, '#9933ff', 8 + Math.floor(Math.random() * 8), 1 + Math.random()));
                            }
                        }
                        if (this.laserChargeTimer <= 0) {
                            // Fire laser!
                            this.laserActiveTimer = 120; // 2 seconds
                            this.laserX = this.x;
                            this.laserSweepDir = Math.random() < 0.5 ? 1 : -1;
                            playSound('chromie-shockwave');
                            screenShake = 3;
                        }
                    } else {
                        // Initialize first laser
                        this.laserChargeTimer = 300;
                    }

                    // Face south
                    this.currentDirection = 'south';
                    this.animTime += frameDt * 60;
                    if (Math.floor(this.animTime / 4) !== Math.floor((this.animTime - frameDt * 60) / 4)) {
                        this.animFrame = (this.animFrame + 1) % 6;
                    }
                    return;
                }

                // Robot minions: walk-pause-spin-aim-shoot cycle
                if (this.isRobotMinion1 || this.isRobotMinion2) {
                    this.behaviorTimer += frameDt * 60;

                    if (this.behaviorState === 'walk') {
                        // WANDER randomly — NOT chase the hero
                        if (!this.wanderAngle || this.behaviorTimer % 40 < 1) {
                            // Pick a new random wander direction every ~0.7s
                            this.wanderAngle = Math.random() * Math.PI * 2;
                        }
                        const finalSpeed = this.speed * enemySpeedMultiplier * 0.7;
                        let wx = Math.cos(this.wanderAngle) * finalSpeed * frameDt * 60;
                        let wy = Math.sin(this.wanderAngle) * finalSpeed * frameDt * 60;
                        // Bounce off edges
                        if (this.x + wx < 20 || this.x + wx > canvas.width - 20) this.wanderAngle = Math.PI - this.wanderAngle;
                        if (this.y + wy < 20 || this.y + wy > canvas.height - 20) this.wanderAngle = -this.wanderAngle;
                        this.x += Math.cos(this.wanderAngle) * finalSpeed * frameDt * 60;
                        this.y += Math.sin(this.wanderAngle) * finalSpeed * frameDt * 60;
                        this.currentDirection = this.getCardinalDirection(Math.cos(this.wanderAngle), Math.sin(this.wanderAngle));
                        if (this.behaviorTimer >= 120) { // 2 seconds of wandering
                            this.behaviorState = 'pause';
                            this.behaviorTimer = 0;
                        }
                    } else if (this.behaviorState === 'pause') {
                        // Stop moving
                        if (this.behaviorTimer >= 30) { // 0.5 seconds
                            this.behaviorState = 'spin';
                            this.behaviorTimer = 0;
                        }
                    } else if (this.behaviorState === 'spin') {
                        // Cycle through directions like a top: east->south->west->north
                        const dirs = ['east', 'south', 'west', 'north'];
                        const cycleFrame = Math.floor(this.behaviorTimer / 8);
                        this.currentDirection = dirs[cycleFrame % 4];
                        if (this.behaviorTimer >= 90) { // 1.5 seconds spinning
                            this.behaviorState = 'settle';
                            this.behaviorTimer = 0;
                        }
                    } else if (this.behaviorState === 'settle') {
                        // Settle and shake — warning before shooting
                        const dx = player.x - this.x;
                        const dy = player.y - this.y;
                        this.currentDirection = this.getCardinalDirection(dx, dy);
                        // Shake effect handled in draw()
                        if (this.behaviorTimer >= 40) { // ~0.7 seconds to aim and shake
                            this.behaviorState = 'shoot';
                            this.behaviorTimer = 0;
                            // Fire purple projectile toward hero
                            const angle = Math.atan2(player.y - this.y, player.x - this.x);
                            const proj = {
                                x: this.x,
                                y: this.y,
                                vx: Math.cos(angle) * 7,
                                vy: Math.sin(angle) * 7,
                                size: 6,
                                color: '#9933ff',
                                isEnemy: true,
                                damage: 1,
                                life: 120,
                                isPurpleLaser: true
                            };
                            projectiles.push(proj);
                            playSound('enemy-hit');
                        }
                    } else if (this.behaviorState === 'shoot') {
                        // Brief pause after shooting, then wander again
                        if (this.behaviorTimer >= 15) {
                            this.behaviorState = 'walk';
                            this.behaviorTimer = 0;
                            this.wanderAngle = Math.random() * Math.PI * 2;
                        }
                    }

                    this.animTime += frameDt * 60;
                    if (Math.floor(this.animTime / 4) !== Math.floor((this.animTime - frameDt * 60) / 4)) {
                        this.animFrame = (this.animFrame + 1) % 6;
                    }
                    return;
                }

                // Tutorial step 3: run straight across, don't chase player
                if (this.tutorialRunAcross) {
                    const finalSpeed = this.speed * enemySpeedMultiplier;
                    this.x += finalSpeed * frameDt * 60;
                    this.currentDirection = 'east';
                    this.animTime += frameDt * 60;
                    if (Math.floor(this.animTime / 4) !== Math.floor((this.animTime - frameDt * 60) / 4)) {
                        this.animFrame = (this.animFrame + 1) % 6;
                    }
                    return;
                }
                
                // Move toward player — with trait-based personality
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                
                if (dist > 0) {
                    // Apply progressive difficulty
                    const finalSpeed = this.speed * enemySpeedMultiplier;
                    this.x += (dx / dist) * finalSpeed * frameDt * 60;
                    this.y += (dy / dist) * finalSpeed * frameDt * 60;
                    this.angle = Math.atan2(dy, dx);
                    
                    // Update facing direction toward player
                    this.currentDirection = this.getCardinalDirection(dx, dy);
                    
                    // Drop permanent color pixels — builds up like Jackson Pollock (not for bosses, except Red King)
                    // Reduced: 1 pixel every 4 frames to prevent canvas saturation
                    if (!this.isBoss && Math.random() < 0.25 * frameDt * 60) {
                        fireTrails.push(new FireTrail(
                            this.x + (Math.random() - 0.5) * 30,
                            this.y + (Math.random() - 0.5) * 20,
                            this.favoriteColor
                        ));
                    }

                    

                }
                
                // Red Minion charging behavior
                // Red Minion fuse countdown — explodes after 4 seconds regardless (not when frozen for death sequence)
                if (this.isRedMinion && !this.frozen) {
                    this.fuseTimer -= frameDt * 60;
                    if (this.fuseTimer <= 0) {
                        // EXPLODE — bright flash effect
                        // White flash circle that fades
                        particles.push(new Particle(this.x, this.y, 0, 0, 'rgba(255,100,50,0.9)', 8, 2.5));
                        particles.push(new Particle(this.x, this.y, 0, 0, 'rgba(255,255,255,0.8)', 6, 2));
                        // Red paint splat on canvas — behind and to sides of bomber
                        const redColors = ['#cc0000', '#ff2222', '#990000', '#ff4444'];
                        // Get direction bomber was moving
                        let dirOffset = 0;
                        if (this.currentDirection === 'east') dirOffset = Math.PI;      // behind = west
                        else if (this.currentDirection === 'west') dirOffset = 0;     // behind = east  
                        else if (this.currentDirection === 'south') dirOffset = -Math.PI/2; // behind = north
                        else if (this.currentDirection === 'north') dirOffset = Math.PI/2;  // behind = south
                        
                        for (let i = 0; i < 40; i++) {
                            // Spray pattern: mostly behind (±120°) with some to sides
                            const spreadAngle = (Math.random() - 0.5) * Math.PI * 1.3; // ±117°
                            const angle = dirOffset + spreadAngle;
                            const dist = Math.random() * 35;
                            const t = new FireTrail(this.x + Math.cos(angle) * dist, this.y + Math.sin(angle) * dist);
                            t.size = 1.5 + Math.random() * 2;
                            t.color = redColors[Math.floor(Math.random() * redColors.length)];
                            fireTrails.push(t);
                        }
                        // Damage player if close enough
                        const distToPlayer = Math.hypot(this.x - player.x, this.y - player.y);
                        if (distToPlayer < 80) {
                            player.health -= 1;
                        }
                        screenShake = 5;
                        playSound('red-minion-explode');
                        this.health = 0;
                        this.exploded = true;
                    }
                }
                
                // Animation — fast legs to match speed
                this.animTime += frameDt * 60;
                if (Math.floor(this.animTime / 4) !== Math.floor((this.animTime - frameDt * 60) / 4)) {
                    this.animFrame = (this.animFrame + 1) % 6;
                }
                
                // Enemies no longer shoot — they charge + leave fire trails
            }
            
            // Helper method to determine cardinal direction from a vector
            // Diagonal favors east/west; north/south only when vertical is clearly dominant
            getCardinalDirection(dx, dy) {
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                
                if (absDy > absDx * 2) {
                    // Strongly vertical — use north/south
                    return dy < 0 ? 'north' : 'south';
                } else if (absDx > 0.01) {
                    // Any meaningful horizontal component — use east/west
                    return dx > 0 ? 'east' : 'west';
                } else {
                    return dy < 0 ? 'north' : 'south';
                }
            }
            

            
            takeDamage(damage, projectileAngle = null) {
                // Red minions are indestructible — UNLESS crown freeze makes them vulnerable
                if (!this.isRedMinion || this.crownVulnerable) {
                    this.health -= damage;
                }
                playSound('enemy-hit');
                
                // Hit flash effect
                this.hitFlash = 3;
                
                // Knockback from projectile — red minions bounce back hard, bosses barely budge
                // No knockback when frozen (crown freeze = completely stuck)
                if (projectileAngle !== null && this.frozenTimer <= 0) {
                    let knockbackForce = this.isRedMinion ? 15 : 8;
                    // Gold King and Robot Girl barely budge
                    if (this.isGoldCrown || this.isRobotGirl) knockbackForce = 2;
                    this.knockbackX = Math.cos(projectileAngle) * knockbackForce;
                    this.knockbackY = Math.sin(projectileAngle) * knockbackForce;
                }
                
                // Damage particles — orange sparks + white flash sparks
                for (let i = 0; i < 8; i++) {
                    particles.push(new Particle(
                        this.x + (Math.random() - 0.5) * 30,
                        this.y + (Math.random() - 0.5) * 30,
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 4,
                        '#ffaa00',
                        15
                    ));
                }
                // White impact sparks — fast, short-lived
                for (let i = 0; i < 5; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const spd = 3 + Math.random() * 5;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(a) * spd, Math.sin(a) * spd,
                        '#ffffff', 8
                    ));
                }
                
                return this.health <= 0;
            }
            
            draw() {
                // Spawn flash — blink on/off when emerging from boss
                if (this.spawnFlash > 0) {
                    // Blink: visible every other 3 frames
                    if (Math.floor(this.spawnFlash) % 6 < 3) {
                        return; // Invisible this frame
                    }
                }
                
                ctx.save();
                
                // Gold King shake when about to spawn minions
                if (this.isGoldCrown && this.shakeTimer > 0) {
                    ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
                }
                
                // Robot minion settle shake — warning before shooting
                if ((this.isRobotMinion1 || this.isRobotMinion2) && this.behaviorState === 'settle') {
                    ctx.translate((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
                    ctx.shadowColor = 'rgba(153,51,255,0.6)';
                    ctx.shadowBlur = 12;
                }
                
                // Gold minion split warning shake
                if ((this.isGoldMinion1 || this.isGoldMinion2) && this.splitWarning && this.splitTimer > 0) {
                    ctx.translate((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4);
                    // Gold warning glow
                    ctx.shadowColor = 'rgba(255,215,0,0.8)';
                    ctx.shadowBlur = 15;
                }
                
                // Subtle drop shadow below character
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + this.size * 0.8, this.size * 0.35, this.size * 0.09, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Subtle white glow so character pops over painted canvas
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255,255,255,0.7)';
                
                // Frozen visual effect — full opacity, just a subtle blue tint
                if (this.frozenTimer > 0) {
                    ctx.shadowColor = 'rgba(100,200,255,0.4)';
                    ctx.shadowBlur = 8;
                }
                
                // Hit flash effect (not for red minions — they're indestructible, no flash needed)
                if (this.hitFlash > 0 && !this.isRedMinion) {
                    ctx.filter = 'brightness(3)';
                }
                

                
                // Draw sprite
                const enemySpriteSheet = sprites.enemySheets[this.spriteId];
                
                // Tier 4 and 5 enemies are bigger
                const sizeMultiplier = this.tier === 5 ? 1.6 : this.tier === 4 ? 1.3 : 1;
                const drawSize = this.size * sizeMultiplier;
                
                // Use the drawSprite helper function
                if (!drawSprite(enemySpriteSheet, this.currentDirection, 'walk', this.animFrame, this.x, this.y, drawSize)) {
                    // Ultimate fallback circle
                    ctx.fillStyle = '#ff4400';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                

                
                ctx.restore();
            }
        }
        
        // Projectile class (for enemy projectiles)
        class Projectile {
            constructor(x, y, angle, speed, damage, color, isEnemy = false) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.damage = damage;
                this.color = color;
                this.isEnemy = isEnemy;
                this.life = 120;
                this.animFrame = 0;
                this.animTime = 0;
                this.bounce = 0;
            }
            
            update() {
                this.x += this.vx * frameDt * 60;
                this.y += this.vy * frameDt * 60;
                this.life -= frameDt * 60;
                this.animTime += frameDt * 60;
                if (Math.floor(this.animTime / 10) !== Math.floor((this.animTime - frameDt * 60) / 10)) {
                    this.animFrame = (this.animFrame + 1) % 6;
                }
                this.bounce += 0.3 * frameDt * 60; // Bobbing motion

                // Enemy projectile collision with player
                if (this.isEnemy) {
                    const dx = this.x - player.x;
                    const dy = this.y - player.y;
                    if (dx * dx + dy * dy < (player.size * player.size)) {
                        player.takeDamage(this.damage);
                        // Purple paint drops on hit
                        for (let i = 0; i < 5; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            const dist = Math.random() * 20;
                            const t = new FireTrail(this.x + Math.cos(angle) * dist, this.y + Math.sin(angle) * dist);
                            t.size = 1 + Math.random() * 1.5;
                            t.color = '#9933ff';
                            fireTrails.push(t);
                        }
                        return true; // Remove projectile
                    }
                }

                const expired = this.life <= 0 ||
                       this.x < 0 || this.x > canvas.width ||
                       this.y < 0 || this.y > canvas.height;

                // Purple paint drops when projectile expires or hits edge
                if (expired && this.isEnemy && this.color === '#9933ff') {
                    for (let i = 0; i < 3; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 15;
                        const t = new FireTrail(this.x + Math.cos(angle) * dist, this.y + Math.sin(angle) * dist);
                        t.size = 0.8 + Math.random() * 1.2;
                        t.color = '#9933ff';
                        fireTrails.push(t);
                    }
                }

                return expired;
            }
            
            draw() {
                ctx.save();
                
                // This shouldn't be used for player projectiles anymore (using LaserBeam instead)
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // LaserBeam class (for hero eye lasers using sprite)
        class LaserBeam {
            constructor(x, y, angle, speed, damage, color, offsetY = 0) {
                this.x = x;
                this.y = y + offsetY;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.angle = angle + Math.PI;
                this.damage = damage;
                this.color = color;

            update() {
                this.x += this.vx * frameDt * 60;
                this.y += this.vy * frameDt * 60;
                this.life -= frameDt * 60;
                this.age += frameDt * 60;
                
                // Duck projectiles leave a subtle yellow paint trail
                if (this.isDuck && Math.random() < 0.35) {
                    const t = new FireTrail(this.x, this.y);
                    t.x = this.x + (Math.random() - 0.5) * 6;
                    t.y = this.y + (Math.random() - 0.5) * 6;
                    t.size = 1 + Math.random() * 1.2;
                    t.color = Math.random() < 0.7 ? '#ffdd00' : '#ffee55';
                    fireTrails.push(t);
                }
                
                return this.life <= 0 ||

                       this.y < 0 || this.y > canvas.height;

            draw() {
                ctx.save();

                    let duckDir = 'right'; // default
                    if (this.duckDir === 'west') duckDir = 'left';
                    else if (this.duckDir === 'north') duckDir = 'up';
                    else if (this.duckDir === 'south') duckDir = 'down';
                    
                    const duckImg = duckProjectileSprites[duckDir];
                    if (duckImg && duckImg.complete && duckImg.naturalWidth > 0) {
                        try {
                        ctx.shadowBlur = 8;

                        ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);

                const growProgress = Math.min(1, this.age / 4);
                const scale = 0.3 + growProgress * 0.7;
                const width = 25 * scale;
                const height = 3 * scale;
                
                // Red glow

                ctx.translate(this.x, this.y);

                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = height * 2.5;
                    ctx.beginPath();
                    ctx.moveTo(-width / 2, 0);
                    ctx.lineTo(width / 2, 0);
                    ctx.stroke();
                    // Outer red glow

                    ctx.lineWidth = height * 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-width / 2, 0);

                let coloredPixels = 0;
                const totalSampled = artCanvas.width * artCanvas.height;
                for (let i = 0; i < sampleData.length; i += 16) {
                    const r = sampleData[i], g = sampleData[i+1], b = sampleData[i+2];
                    if (r !== 255 || g !== 255 || b !== 255) coloredPixels++;
                }
                canvasCoverage = Math.round((coloredPixels / (totalSampled / 4)) * 100);

                // Generate art title
                if (!currentArtTitle) {
                    currentArtTitle = artTitles[Math.floor(Math.random() * artTitles.length)] + Math.floor(Math.random() * 999);
                }

        function draw() {
            // Screen shake
            ctx.save();

                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }

                ctx.fillText('Visit on mobile!', canvas.width/2, canvas.height/2 + 20);
                ctx.restore();
                return;
            }
            
            if (gameState === 'menu') {
                drawMenu();
            } else if (gameState === 'tutorial') {
                drawTutorial();
            } else if (gameState === 'preroll') {
                drawPreroll();
            } else if (gameState === 'playing') {
                // Clean white background — no stars
                
                // Draw arena border (subtle)
                ctx.save();
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
                ctx.restore();
                
                // Draw game objects
                // Draw order: trails (paint) → particles → lasers → enemies → player
                // Draw accumulated paint bitmap first
                if (paintCanvas) ctx.drawImage(paintCanvas, 0, 0);
                // Draw this frame's new trails on top (same fillRect look)
                fireTrails.forEach(trail => trail.draw());
                // Bake new trails into bitmap and clear array
                if (paintCtx && fireTrails.length > 0) {
                    fireTrails.forEach(trail => {
                        paintCtx.fillStyle = trail.color;
                        paintCtx.fillRect(trail.x - trail.size, trail.y - trail.size, trail.size * 2, trail.size * 2);
                        // Also draw on coverage canvas for tracking
                        if (coverageCtx) {
                            coverageCtx.fillStyle = '#ffffff';
                            coverageCtx.beginPath();
                            coverageCtx.arc(trail.x, trail.y, trail.size, 0, Math.PI * 2);
                            coverageCtx.fill();
                        }
                    });
                    fireTrails = [];
                }

                // Check canvas coverage every 60 frames (1 second at 60fps)
                coverageCheckTimer += frameDt * 60;
                if (coverageCheckTimer >= 60) {
                    coverageCheckTimer = 0;
                    if (coverageCtx && coverageCanvas) {
                        const imageData = coverageCtx.getImageData(0, 0, coverageCanvas.width, coverageCanvas.height);
                        const pixels = imageData.data;
                        let paintedPixels = 0;
                        const totalPixels = coverageCanvas.width * coverageCanvas.height;
                        // Sample every 4 pixels for performance
                        for (let i = 0; i < pixels.length; i += 16) {
                            if (pixels[i + 3] > 0) paintedPixels++;
                        }
                        canvasCoverage = (paintedPixels * 4) / totalPixels;

        function drawJoystick(cx, cy, radius, nubOffX, nubOffY, alpha) {
            ctx.globalAlpha = alpha;

            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';

            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            // Nub
            const nubR = radius * 0.32;
            const nubX = cx + nubOffX * radius * 0.4;
            const nubY = cy + nubOffY * radius * 0.4;
            ctx.beginPath();
            ctx.arc(nubX, nubY, nubR, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.globalAlpha = 1;

        function hangArtMidGame() {
            galleryReturnState = gameState;
            gameState = 'gallery';
            playSound('menu-tap');
            // Capture current canvas state
            if (!capturedArt || galleryReturnState === 'playing') {
                const artScale = 4;
                const artCanvas = document.createElement('canvas');
                artCanvas.width = canvas.width * artScale;
                artCanvas.height = canvas.height * artScale;
                const artCtx = artCanvas.getContext('2d');
                artCtx.fillStyle = '#ffffff';
                artCtx.fillRect(0, 0, artCanvas.width, artCanvas.height);
                if (paintCanvas) {
                    artCtx.imageSmoothingEnabled = false;
                    artCtx.drawImage(paintCanvas, 0, 0, artCanvas.width, artCanvas.height);
                    artCtx.imageSmoothingEnabled = true;
                }
                // Bake current trails
                fireTrails.forEach(trail => {
                    artCtx.fillStyle = trail.color;
                    const sx = trail.x * artScale;
                    const sy = trail.y * artScale;
                    const ss = trail.size * artScale;
                    artCtx.fillRect(sx - ss, sy - ss, ss * 2, ss * 2);
                });
                capturedArt = artCanvas;
                // Calculate coverage
                const sampleData = artCtx.getImageData(0, 0, artCanvas.width, artCanvas.height).data;
                let coloredPixels = 0;
                for (let i = 0; i < sampleData.length; i += 16) {
                    const r = sampleData[i], g = sampleData[i+1], b = sampleData[i+2];
                    if (r !== 255 || g !== 255 || b !== 255) coloredPixels++;
                }
                canvasCoverage = Math.round((coloredPixels / (sampleData.length / 16)) * 100);
            }
            if (!currentArtTitle) {
                currentArtTitle = artTitles[Math.floor(Math.random() * artTitles.length)] + Math.floor(Math.random() * 999);
            }

        function saveArtwork() {
            if (!capturedArt) return;
            capturedArt.toBlob(async blob => {
                const file = new File([blob], (currentArtTitle || 'moonbird-art').replace(/[^a-zA-Z0-9 #]/g, '') + '.jpg', { type: 'image/jpeg' });
                // Try Web Share API first (iOS saves to camera roll via share sheet)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({ files: [file] });
                        return;
                    } catch(e) { /* user cancelled or failed, fall through */ }
                }
                // Fallback: download link
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.92);
        }
        
        function drawGameOver() {
            // Fade in timing
            const elapsed = (Date.now() - gameOverTime) / 1000;
            const fadeIn = Math.min(1, elapsed / 1.5);
            
            // Gallery wall background
            const wallColor = `rgba(245,240,232,${fadeIn * 0.95})`;
            ctx.fillStyle = wallColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (fadeIn < 0.3) return;
            
            // Subtle wall texture
            if (fadeIn > 0.5) {
                ctx.strokeStyle = `rgba(200,190,175,${(fadeIn - 0.5) * 0.15})`;
                ctx.lineWidth = 0.5;
                for (let y = 0; y < canvas.height; y += 8) {
                    ctx.beginPath();
                    ctx.moveTo(0, y + Math.sin(y * 0.1) * 0.5);
                    ctx.lineTo(canvas.width, y + Math.cos(y * 0.1) * 0.5);
                    ctx.stroke();
                }
            }
            
            const contentAlpha = Math.min(1, (fadeIn - 0.3) / 0.7);
            ctx.save();
            ctx.globalAlpha = contentAlpha;
            
            if (!capturedArt) { ctx.restore(); return; }
            
            // Frame dimensions — painting fills the screen generously
            const maxW = canvas.width * 0.92;
            const maxH = canvas.height * 0.68;
            const artRatio = capturedArt.width / capturedArt.height;
            let artW, artH;
            if (artRatio > maxW / maxH) {
                artW = maxW; artH = maxW / artRatio;
            } else {
                artH = maxH; artW = maxH * artRatio;
            }
            const artX = (canvas.width - artW) / 2;
            const artY = (canvas.height - artH) / 2 - 35;
            
            // Drop shadow
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 4;
            ctx.shadowOffsetY = 6;
            
            // Wooden frame

            ctx.fillStyle = '#3d2b1a';
            ctx.fillRect(artX - fw, artY - fw, artW + fw*2, artH + fw*2);
            ctx.fillStyle = '#5a3f2b';
            ctx.fillRect(artX - fw + 3, artY - fw + 3, artW + fw*2 - 6, artH + fw*2 - 6);
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(artX - 2, artY - 2, artW + 4, artH + 4);
            
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // The painting
            ctx.drawImage(capturedArt, artX, artY, artW, artH);
            
            // Museum label
            const cx = canvas.width / 2;
            const labelY = artY + artH + fw + 28;
            ctx.textAlign = 'center';
            
            // Game over message
            ctx.font = 'italic 15px Georgia, serif';
            ctx.fillStyle = '#444444';
            ctx.fillText('game over, but at least you made some art', cx, labelY);
            
            // Stats — clear and separate
